name: Deploy slides to GitHub Pages

# The deck in slides/ is a static site with no build step: reveal.js, KaTeX,
# fonts and three.js come from pinned CDNs, all other assets are committed.
# Pages' deploy-from-branch mode can only serve / or /docs, so we upload
# slides/ as the artifact instead — that makes slides/index.html the site root.
#
# Requires: Settings -> Pages -> Source: "GitHub Actions".

on:
  push:
    branches: [main]
    paths:
      - 'slides/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: slides
      - id: deployment
        uses: actions/deploy-pages@v4
