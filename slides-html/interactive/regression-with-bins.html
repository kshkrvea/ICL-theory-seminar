<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TabPFN Distribution Visualisation</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --panel-bg: #ffffff;
            --text-main: #000000;
            --accent: #38bdf8;
            --border: #dddddd;
            --bar-color: #3b82f6;
            --bar-highlight: #60a5fa;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 24px;
            box-sizing: border-box;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .controls-bar {
            background-color: var(--panel-bg);
            border: 1px solid var(--border);
            padding: 16px 24px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .slider-group {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-grow: 1;
        }

        input[type="range"] {
            flex-grow: 1;
            accent-color: var(--accent);
            cursor: pointer;
        }

        .panel {
            background-color: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        canvas {
            width: 100%;
            height: 380px;
            background-color: var(--bg-color);
            border-radius: 4px;
            border: 1px solid #eeeeee;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="panel">
            <canvas id="distCanvas"></canvas>
        </div>

        <div class="controls-bar">
            <div class="slider-group">
                <input type="range" id="binSlider" min="1" max="500" step="1" value="4">
            </div>
        </div>
    </div>

    <script>
        const binSlider = document.getElementById('binSlider');
        const distCanvas = document.getElementById('distCanvas');
        const distCtx = distCanvas.getContext('2d');

        const Y_MIN = -2.5;
        const Y_MAX = 2.5;
        const FIXED_X = 0.5;

        function resizeCanvases() {
            const rect = distCanvas.getBoundingClientRect();
            distCanvas.width = rect.width * window.devicePixelRatio;
            distCanvas.height = rect.height * window.devicePixelRatio;
            distCtx.scale(window.devicePixelRatio, window.devicePixelRatio);
            render();
        }
        window.addEventListener('resize', resizeCanvases);

        function getTrueDensity(x, y) {
            const split = Math.sin(x) * 1.2;
            const mean1 = split;
            const std1 = 0.25 + 0.1 * Math.abs(x);
            const p1 = Math.exp(-0.5 * Math.pow((y - mean1) / std1, 2)) / (std1 * Math.sqrt(2 * Math.PI));

            const mean2 = -split * 0.5;
            const std2 = 0.35;
            const p2 = Math.exp(-0.5 * Math.pow((y - mean2) / std2, 2)) / (std2 * Math.sqrt(2 * Math.PI));

            const w1 = 0.6 + 0.3 * Math.sin(x * 1.5);
            const w2 = 1.0 - w1;

            return w1 * p1 + w2 * p2;
        }

        // Generates highly uneven, adaptive quantile bins
        function generateBins(numBins) {
            // 1. Sample the background distribution across the target space to get the cumulative mass
            const resolution = 2000;
            const step = (Y_MAX - Y_MIN) / resolution;
            const cdf = [0];
            
            for (let i = 0; i < resolution; i++) {
                const y = Y_MIN + (i + 0.5) * step;
                // Mix the true target density with a uniform background so outer tail bins still get finite width
                const density = 0.85 * getTrueDensity(FIXED_X, y) + 0.15 * (1 / (Y_MAX - Y_MIN));
                cdf.push(cdf[i] + density * step);
            }

            const totalMass = cdf[resolution];
            const bins = [Y_MIN];
            let cdfIndex = 0;

            // 2. Place bin borders at equal-probability intervals (quantiles)
            for (let b = 1; b < numBins; b++) {
                const targetMass = (b / numBins) * totalMass;
                while (cdfIndex < resolution && cdf[cdfIndex] < targetMass) {
                    cdfIndex++;
                }
                
                // Linear interpolation for exact quantile border
                const idx0 = Math.max(0, cdfIndex - 1);
                const mass0 = cdf[idx0];
                const mass1 = cdf[cdfIndex] || totalMass;
                const t = (mass1 === mass0) ? 0 : (targetMass - mass0) / (mass1 - mass0);
                
                const y0 = Y_MIN + idx0 * step;
                const y1 = Y_MIN + cdfIndex * step;
                bins.push(y0 + t * (y1 - y0));
            }
            bins.push(Y_MAX);
            return bins;
        }

        // Compute probability mass per bin, then divide by width to get Density
        function computeBinDensities(x, binEdges) {
            const numBins = binEdges.length - 1;
            const densities = [];

            for (let i = 0; i < numBins; i++) {
                const yLower = binEdges[i];
                const yUpper = binEdges[i+1];
                const binWidth = yUpper - yLower;

                // Numerical integration of probability mass inside this specific bin
                const subSteps = 10;
                const subWidth = binWidth / subSteps;
                let binMass = 0;
                
                for (let s = 0; s < subSteps; s++) {
                    const y = yLower + (s + 0.5) * subWidth;
                    binMass += getTrueDensity(x, y) * subWidth;
                }

                // Density = Probability Mass / Bin Width
                densities.push(binMass / (binWidth || 1e-6));
            }

            return densities;
        }

        function render() {
            const numBins = parseInt(binSlider.value, 10);
            const binEdges = generateBins(numBins);
            const densities = computeBinDensities(FIXED_X, binEdges);
            drawDistribution(densities, binEdges, numBins);
        }

        function drawDistribution(densities, binEdges, numBins) {
            const width = distCanvas.getBoundingClientRect().width;
            const height = distCanvas.getBoundingClientRect().height;

            distCtx.clearRect(0, 0, width, height);

            const maxDensity = 1.5;

            distCtx.strokeStyle = 'rgba(0, 0, 0, 0.1)';
            distCtx.lineWidth = 1;
            for (let i = 1; i <= 4; i++) {
                const y = height - (i / 4) * (height - 30);
                distCtx.beginPath();
                distCtx.moveTo(0, y);
                distCtx.lineTo(width, y);
                distCtx.stroke();
            }

            for (let i = 0; i < numBins; i++) {
                const yLower = binEdges[i];
                const yUpper = binEdges[i+1];
                
                const xStart = ((yLower - Y_MIN) / (Y_MAX - Y_MIN)) * width;
                const xEnd = ((yUpper - Y_MIN) / (Y_MAX - Y_MIN)) * width;
                const barWidth = Math.max(0.5, xEnd - xStart);

                const barHeight = Math.min(1, densities[i] / maxDensity) * (height - 30);
                const yStart = height - barHeight - 15;

                distCtx.fillStyle = '#3b82f6';
                distCtx.fillRect(xStart, yStart, barWidth, barHeight);

                if (numBins <= 150) {
                    distCtx.strokeStyle = '#60a5fa';
                    distCtx.lineWidth = 0.5;
                    distCtx.strokeRect(xStart, yStart, barWidth, barHeight);
                }
            }

            distCtx.fillStyle = '#000000';
            distCtx.font = 'bold 16px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace';
            distCtx.textAlign = 'right';
            distCtx.fillText(`num_bins = ${numBins}`, width - 20, 30);
            distCtx.textAlign = 'left';
        }

        binSlider.addEventListener('input', render);
        setTimeout(resizeCanvases, 50);
    </script>
</body>
</html>
