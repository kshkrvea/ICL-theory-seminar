<!DOCTYPE html>
<!-- ===================================================================
  interactive/bnn.html — slide-embedded adaptation of
  slides/figures/tabpfn/bnn/bnn.html (BNN prior construction pipeline).
  Embedded as a full-slide iframe on the TabPFN "Bayesian Neural
  Networks Prior" slide (sections/tabpfn.html #tp-bnn), replacing the
  8-step BNN_Prior_Step_*.pdf flip.

  CHANGES vs the standalone source (functionality untouched):
    - stripped the PDF-export chrome: jsPDF + svg2pdf CDN scripts, the
      "Save Current Plot as PDF" button/group and its handler;
    - stripped the standalone <h2> page heading and page margins;
    - layout fills the iframe box (100vw x 100vh flex row);
    - compact 220px controls column, no execution ledger;
    - buttons: white/dark default; .next-step = dark fill (see updateUIState).

  HOW TO ADJUST:
    - controls column width: .controls { width }.
    - all simulation logic (steps 1-6) is verbatim from the source
      file — tweak there and re-copy if the two should stay in sync.
=================================================================== -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BNN Prior & Target Discretization Pipeline</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/lmroman10@5.2.5/400.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/lmroman10@5.2.5/700.css">
    <style>
        :root {
            --mDarkTeal: #23373b;
            --mDarkTealHover: #1a292c;
            --mAlert: #eb811b;
            --mAlertHover: #c96d0f;
        }
        html, body {
            height: 100%;
        }
        body {
            font-family: 'LM Roman 10', 'Latin Modern Roman', Georgia, serif;
            margin: 0;
            background-color: #ffffff;
            color: #212529;
            text-rendering: geometricPrecision;
            -webkit-font-smoothing: antialiased;
        }
        .container {
            display: flex;
            gap: 12px;
            height: 100%;
            box-sizing: border-box;
            padding: 6px;
        }
        .controls {
            width: 220px;
            flex: 0 0 auto;
            background: #ffffff;
            padding: 10px 12px;
            border-radius: 6px;
            border: 1px solid #e2e5e6;
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-height: 0;
            box-sizing: border-box;
        }
        .visualization-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-width: 0;
        }
        .canvas-box {
            background: #ffffff;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #e2e5e6;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }
        .control-group {
            padding-bottom: 8px;
            border-bottom: 1px solid #e9ecef;
        }
        .control-group:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 4px;
            font-size: 0.62rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #495057;
        }
        button {
            width: 100%;
            padding: 6px 8px;
            border-radius: 4px;
            border: 1px solid #ced4da;
            box-sizing: border-box;
            background-color: #ffffff;
            color: var(--mDarkTeal);
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s, border-color 0.2s, color 0.2s;
            margin-bottom: 5px;
            text-align: left;
            font-size: 0.72rem;
        }
        button:hover:not(:disabled):not(.next-step) {
            background-color: #f3f4f5;
            border-color: #adb5bd;
        }
        button:disabled {
            background-color: #ffffff;
            color: var(--mDarkTeal);
            border-color: #dee2e6;
            opacity: 0.45;
            cursor: not-allowed;
        }
        button.next-step {
            background-color: var(--mDarkTeal);
            color: #ffffff;
            border-color: var(--mDarkTeal);
            opacity: 1;
        }
        button.next-step:hover:not(:disabled) {
            background-color: var(--mDarkTealHover);
            border-color: var(--mDarkTealHover);
        }
        svg {
            border: 1px solid #e9ecef;
            border-radius: 4px;
            background-color: #ffffff;
            width: 100%;
            height: auto;
            max-height: calc(100vh - 30px);
            aspect-ratio: 1000 / 470;
            shape-rendering: geometricPrecision;
            text-rendering: geometricPrecision;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="controls">
        <div class="control-group">
            <label>Phase I: Graph Construction</label>
            <button id="btn-sample-hyper">Step 1: Sample Hyperparameters</button>
            <button id="btn-build-dense" disabled>Step 2: Build Dense Network</button>
            <button id="btn-dropout-edges" disabled>Step 3: Apply Edge Dropout</button>
        </div>

        <div class="control-group">
            <label>Phase II: Data Flow &amp; Execution</label>
            <button id="btn-sample-input" disabled>Step 4: Inject Input Features</button>
            <button id="btn-flow-data" disabled>Step 5: Forward Pass Layer Flow</button>
        </div>

        <div class="control-group">
            <label>Phase III: Target Discretization</label>
            <button id="btn-transform-class" disabled>Step 6: Transform to Class Label</button>
        </div>
    </div>

    <div class="visualization-panel">
        <div class="canvas-box">
            <svg id="main-svg" viewBox="0 0 1000 470" xmlns="http://www.w3.org/2000/svg"></svg>
        </div>
    </div>
</div>

<script>
    let state = {
        step: 0,
        stepTitle: "System Idle",
        layers: 0,
        hiddenUnits: 0,
        activation: 'Identity',
        dropoutRate: 0.0,
        graph: null,
        currentPropagationLayer: -1,
        continuousOutput: null,
        classData: null,
        axisDomain: null // Retains absolute [min, max] domain across Step 5 and 6
    };

    const activations = ['Tanh', 'Leaky ReLU', 'ELU', 'Identity'];

    const btnSampleHyper = document.getElementById('btn-sample-hyper');
    const btnBuildDense = document.getElementById('btn-build-dense');
    const btnDropoutEdges = document.getElementById('btn-dropout-edges');
    const btnSampleInput = document.getElementById('btn-sample-input');
    const btnFlowData = document.getElementById('btn-flow-data');
    const btnTransformClass = document.getElementById('btn-transform-class');
    const mainSvg = document.getElementById('main-svg');
    const allStepButtons = [
        btnSampleHyper, btnBuildDense, btnDropoutEdges,
        btnSampleInput, btnFlowData, btnTransformClass,
    ];

    function logToLedger() { /* ledger removed for slide embed */ }

    function highlightNextStep() {
        allStepButtons.forEach(b => b.classList.remove('next-step'));
        let next = null;
        if (state.step === 0) next = btnSampleHyper;
        else if (state.step === 1) next = btnBuildDense;
        else if (state.step === 2) next = btnDropoutEdges;
        else if (state.step === 3) next = btnSampleInput;
        else if (state.step === 4) next = btnFlowData;
        else if (state.step === 5 && state.continuousOutput !== null && !state.classData) next = btnTransformClass;
        else if (state.step >= 6) next = btnSampleHyper;
        if (next && !next.disabled) next.classList.add('next-step');
    }

    function updateUIState() {
        btnBuildDense.disabled = state.step < 1;
        btnDropoutEdges.disabled = state.step < 2;
        btnSampleInput.disabled = state.step < 3;
        btnFlowData.disabled = state.step < 4;
        btnTransformClass.disabled = state.step < 5 || state.continuousOutput === null;
        highlightNextStep();
    }

    function applyActivation(x, type) {
        switch(type) {
            case 'Tanh': return Math.tanh(x);
            case 'Leaky ReLU': return x >= 0 ? x : 0.1 * x;
            case 'ELU': return x >= 0 ? x : 1.0 * (Math.exp(x) - 1);
            case 'Identity':
            default: return x;
        }
    }

    btnSampleHyper.addEventListener('click', () => {
        state.layers = Math.floor(Math.random() * 2) + 2;
        // 1. Made network width smaller (3 to 4 hidden units)
        state.hiddenUnits = Math.floor(Math.random() * 2) + 3;
        state.activation = activations[Math.floor(Math.random() * activations.length)];
        state.dropoutRate = +(Math.random() * 0.35 + 0.15).toFixed(2);

        state.step = 1;
        state.stepTitle = "Step 1: Sample Hyperparameters from Meta-Prior";
        state.currentPropagationLayer = -1;
        state.continuousOutput = null;
        state.classData = null;
        state.axisDomain = null;
        state.graph = null;

        logToLedger(`[Step 1: Hyperparameters Sampled]\n` +
            `• Hidden Layers (l): ${state.layers}\n` +
            `• Hidden Width (h): ${state.hiddenUnits}\n` +
            `• Activation Function: ${state.activation}\n` +
            `• Structural Edge Dropout Probability: ${state.dropoutRate * 100}%`);

        renderUnifiedCanvas();
        updateUIState();
    });

    btnBuildDense.addEventListener('click', () => {
        const width = 1000;
        const height = 300;
        const offsetY = 62;

        let topology = [];
        topology.push({ type: 'input', count: 3 });
        for(let i = 0; i < state.layers; i++) {
            topology.push({ type: 'hidden', count: state.hiddenUnits });
        }
        topology.push({ type: 'output', count: 1 });

        let nodes = [];
        let edges = [];

        // Equal left/right margins (= layerSpacing) so the graph is horizontally
        // centered in the image.
        let layerSpacing = width / (topology.length + 1);

        topology.forEach((layer, lIdx) => {
            let x = layerSpacing * (lIdx + 1);
            let nodeSpacing = height / (layer.count + 1);

            for(let nIdx = 0; nIdx < layer.count; nIdx++) {
                let y = offsetY + nodeSpacing * (nIdx + 1);
                let id = `L${lIdx}_N${nIdx}`;
                nodes.push({
                    id: id,
                    x: x,
                    y: y,
                    layer: lIdx,
                    type: layer.type,
                    value: 0.0,
                    bias: (layer.type !== 'input') ? (Math.random() * 2 - 1) : 0
                });
            }
        });

        for(let l = 0; l < topology.length - 1; l++) {
            let currentLayerNodes = nodes.filter(n => n.layer === l);
            let nextLayerNodes = nodes.filter(n => n.layer === l + 1);

            currentLayerNodes.forEach(source => {
                nextLayerNodes.forEach(target => {
                    let u1 = Math.max(1e-9, Math.random());
                    let u2 = Math.random();
                    let w = Math.sqrt(-2.0 * Math.log(u1)) * Math.cos(2.0 * Math.PI * u2) * 0.8;

                    edges.push({
                        id: `E_${source.id}_${target.id}`,
                        source: source,
                        target: target,
                        weight: w,
                        dropped: false
                    });
                });
            });
        }

        state.graph = { nodes, edges, topology };
        state.step = 2;
        state.stepTitle = "Step 2: Build Fully Connected Feedforward Network";
        state.currentPropagationLayer = -1;
        state.continuousOutput = null;
        state.classData = null;
        state.axisDomain = null;

        logToLedger(`[Step 2: Dense Network Constructed]\n` +
            `• Total Vertices: ${nodes.length}\n` +
            `• Initial Dense Edges: ${edges.length} (100% connected)\n` +
            `• Synaptic weights initialized via N(0, σ²)`);

        renderUnifiedCanvas();
        updateUIState();
    });

    btnDropoutEdges.addEventListener('click', () => {
        if (!state.graph) return;

        let dropCount = 0;
        state.graph.edges.forEach(edge => {
            if (Math.random() < state.dropoutRate) {
                if (edge.target.type !== 'output' || state.graph.edges.filter(e => e.target.id === edge.target.id && !e.dropped).length > 1) {
                    edge.dropped = true;
                    dropCount++;
                }
            }
        });

        state.step = 3;
        state.stepTitle = "Step 3: Apply Structural Edge Dropout (SCM Sparsification)";

        let activeEdges = state.graph.edges.length - dropCount;
        let actualRate = ((dropCount / state.graph.edges.length) * 100).toFixed(1);

        logToLedger(`[Step 3: Edge Dropout Applied]\n` +
            `• Dropped Edges: ${dropCount} (${actualRate}% removed)\n` +
            `• Surviving Active Edges: ${activeEdges}\n` +
            `• Topological Structure: Directed Acyclic Graph (DAG) established.`);

        renderUnifiedCanvas();
        updateUIState();
    });

    btnSampleInput.addEventListener('click', () => {
        if (!state.graph) return;

        state.graph.nodes.forEach(node => {
            if(node.type === 'input') {
                node.value = +(Math.random() * 4 - 2).toFixed(3);
            } else {
                node.value = 0.0;
            }
        });

        state.step = 4;
        state.stepTitle = "Step 4: Inject Input Feature Data Vectors";
        state.currentPropagationLayer = 0;
        state.continuousOutput = null;
        state.classData = null;
        state.axisDomain = null;

        let inputVals = state.graph.nodes.filter(n => n.type === 'input').map(n => n.value).join(', ');
        logToLedger(`[Step 4: Input Features Injected]\n` +
            `• Input Vector (z_X): [${inputVals}]\n` +
            `• Downstream latent activations reset to 0.0`);

        renderUnifiedCanvas();
        updateUIState();
    });

    btnFlowData.addEventListener('click', () => {
        if (!state.graph || state.currentPropagationLayer < 0) return;

        let nextLayer = state.currentPropagationLayer + 1;
        if (nextLayer >= state.graph.topology.length) {
            state.currentPropagationLayer = 0;
            logToLedger(`[Forward Pass Completed]\n` +
                `• Continuous Scalar Output (ŷ): ${state.continuousOutput.toFixed(4)}\n` +
                `• Ready for Phase III interval discretization.`);
            updateUIState();
            return;
        }

        let targetNodes = state.graph.nodes.filter(n => n.layer === nextLayer);

        targetNodes.forEach(tNode => {
            let incomingEdges = state.graph.edges.filter(e => e.target.id === tNode.id && !e.dropped);
            let dotProduct = 0;

            incomingEdges.forEach(edge => {
                dotProduct += edge.source.value * edge.weight;
            });

            let linearActivation = dotProduct + tNode.bias;
            if(tNode.type === 'hidden') {
                tNode.value = +applyActivation(linearActivation, state.activation).toFixed(4);
            } else {
                tNode.value = +linearActivation.toFixed(4);
                state.continuousOutput = tNode.value;
            }
        });

        state.currentPropagationLayer = nextLayer;
        state.stepTitle = `Step 5: Forward Propagation (Layer ${nextLayer} Active)`;
        if (nextLayer === state.graph.topology.length - 1) {
            state.step = 5;
            state.stepTitle = "Step 5: Forward Propagation Complete (Scalar Target Computed)";
            // 5. Establish absolute axis domain at step 5 to prevent shifting
            state.axisDomain = {
                min: state.continuousOutput - 2.5,
                max: state.continuousOutput + 2.5
            };
        }

        let layerDetailsText = targetNodes.map((n, i) => `  - Node N${i}: ${n.value.toFixed(4)}`).join('\n');
        logToLedger(`[Step 5: Propagated to Layer ${nextLayer}]\n` +
            `• Operation: W_active × z + b → ${state.activation}\n` +
            `• Active Node Values:\n${layerDetailsText}`);

        renderUnifiedCanvas(true);
        updateUIState();
    });

    btnTransformClass.addEventListener('click', () => {
        if (state.continuousOutput === null) return;

        let numClasses = Math.floor(Math.random() * 3) + 3;

        // 5. Generate thresholds strictly within the established Step 5 axis domain
        let bounds = [];
        let baseVal = state.continuousOutput;
        for (let i = 0; i < numClasses - 1; i++) {
            let offset = (Math.random() * 3 - 1.5);
            bounds.push(+(baseVal + offset).toFixed(2));
        }
        bounds.sort((a, b) => a - b);

        for(let i = 1; i < bounds.length; i++) {
            if(bounds[i] <= bounds[i-1]) bounds[i] = +(bounds[i-1] + 0.35).toFixed(2);
        }

        // Expand axis domain slightly only if randomly generated bounds exceed Step 5 initial domain
        let minVal = Math.min(state.axisDomain.min, ...bounds) - 0.5;
        let maxVal = Math.max(state.axisDomain.max, ...bounds) + 0.5;
        state.axisDomain = { min: minVal, max: maxVal };

        let assignedClass = 0;
        bounds.forEach(bound => {
            if (bound < state.continuousOutput) {
                assignedClass++;
            }
        });

        let intervals = [];
        for(let c = 0; c < numClasses; c++) {
            let lower = c === 0 ? '-∞' : bounds[c-1];
            let upper = c === numClasses - 1 ? '+∞' : bounds[c];
            let match = c === assignedClass ? ' ◄== [ASSIGNED]' : '';
            intervals.push(`  Class ${c}: (${lower}, ${upper}]${match}`);
        }

        state.classData = { numClasses, bounds, assignedClass };
        state.step = 6;
        state.stepTitle = "Step 6: Transform Continuous Target to Discrete Class Label";

        logToLedger(`[Step 6: Target Discretized to Class Label]\n` +
            `• Sampled Class Count (N_c): ${numClasses}\n` +
            `• Threshold Split Boundaries (B_i): [${bounds.join(', ')}]\n` +
            `• Continuous Target (ŷ): ${state.continuousOutput.toFixed(4)}\n` +
            `• Interval Mapping Ledger:\n${intervals.join('\n')}\n` +
            `• Final Assigned Class: [ y = ${assignedClass} ]`);

        renderUnifiedCanvas();
        updateUIState();
    });

    function renderUnifiedCanvas(highlightActiveFlow = false) {
        mainSvg.innerHTML = '';

        const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
        defs.innerHTML = `
            <style>
                text { font-family: 'LM Roman 10', Georgia, serif; }
                .mono { font-family: monospace; font-weight: bold; }
            </style>
        `;
        mainSvg.appendChild(defs);

        const titleText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        titleText.setAttribute('x', 30);
        titleText.setAttribute('y', 28);
        titleText.setAttribute('font-size', '18px');
        titleText.setAttribute('font-weight', 'bold');
        titleText.setAttribute('fill', '#212529');
        titleText.textContent = state.stepTitle;
        mainSvg.appendChild(titleText);

        const subText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        subText.setAttribute('x', 30);
        subText.setAttribute('y', 47);
        subText.setAttribute('font-size', '13px');
        subText.setAttribute('fill', '#6c757d');
        subText.textContent = `Architecture: ${state.layers} Hidden Layers | Width: ${state.hiddenUnits} | Activation: ${state.activation} | Target Edge Dropout: ${(state.dropoutRate*100).toFixed(0)}%`;
        mainSvg.appendChild(subText);

        if (state.graph) {
            state.graph.edges.forEach(edge => {
                // Arrowheads are explicit polygons (not SVG <marker>) — kept from the
                // source file so the drawing is identical.
                const dx = edge.target.x - edge.source.x;
                const dy = edge.target.y - edge.source.y;
                const len = Math.hypot(dx, dy) || 1;
                const ux = dx / len, uy = dy / len;
                const px = -uy, py = ux; // unit perpendicular
                const sR = edge.source.type === 'output' ? 26 : 20;
                const tR = edge.target.type === 'output' ? 26 : 20;

                const aLen = 11, aHalf = 4.5;          // arrowhead length / half-width
                const startX = edge.source.x + ux * sR;
                const startY = edge.source.y + uy * sR;
                const tipX = edge.target.x - ux * (tR + 3);
                const tipY = edge.target.y - uy * (tR + 3);
                const baseX = tipX - ux * aLen;
                const baseY = tipY - uy * aLen;

                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                line.setAttribute('x1', startX);
                line.setAttribute('y1', startY);

                if (edge.dropped) {
                    line.setAttribute('x2', tipX);
                    line.setAttribute('y2', tipY);
                    line.setAttribute('stroke', '#dee2e6');
                    line.setAttribute('stroke-opacity', '0.2');
                    line.setAttribute('stroke-dasharray', '3,5');
                    line.setAttribute('stroke-width', '1.5px');
                    mainSvg.appendChild(line);
                    return; // dropped edge: no arrowhead
                }

                const isActive = highlightActiveFlow && (edge.target.layer === state.currentPropagationLayer);
                const lineColor = isActive ? '#28a745' : '#6c757d';
                const headColor = isActive ? '#28a745' : '#6c757d';

                // stop the line at the base of the arrowhead so it doesn't poke past the tip
                line.setAttribute('x2', baseX);
                line.setAttribute('y2', baseY);
                line.setAttribute('stroke', lineColor);
                if (isActive) {
                    line.setAttribute('stroke-width', '3px');
                    line.setAttribute('stroke-dasharray', '6,6');
                } else {
                    line.setAttribute('stroke-opacity', '0.5');
                    line.setAttribute('stroke-width', Math.min(Math.abs(edge.weight) * 2.0 + 1.0, 3.5));
                }
                mainSvg.appendChild(line);

                const head = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
                head.setAttribute('points',
                    `${tipX},${tipY} ` +
                    `${baseX + px * aHalf},${baseY + py * aHalf} ` +
                    `${baseX - px * aHalf},${baseY - py * aHalf}`);
                head.setAttribute('fill', headColor);
                mainSvg.appendChild(head);
            });

            state.graph.nodes.forEach(node => {
                const group = document.createElementNS('http://www.w3.org/2000/svg', 'g');

                const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                circle.setAttribute('cx', node.x);
                circle.setAttribute('cy', node.y);
                circle.setAttribute('r', node.type === 'output' ? 26 : 20);

                let baseColor = '#ffffff';
                if (node.type === 'input') baseColor = '#e9ecef';
                else if (node.type === 'hidden') baseColor = '#e3f2fd';
                else if (node.type === 'output') baseColor = state.classData ? '#28a745' : '#fff3cd';

                let strokeColor = '#6c757d';
                if (state.classData && node.type === 'output') {
                    strokeColor = '#1e7e34';
                    circle.setAttribute('stroke-width', '4px');
                } else if (highlightActiveFlow && node.layer === state.currentPropagationLayer) {
                    strokeColor = '#28a745';
                    circle.setAttribute('stroke-width', '3.5px');
                } else if (highlightActiveFlow && node.layer < state.currentPropagationLayer) {
                    strokeColor = '#17a2b8';
                    circle.setAttribute('stroke-width', '2px');
                } else {
                    circle.setAttribute('stroke-width', '2px');
                }

                circle.setAttribute('fill', baseColor);
                circle.setAttribute('stroke', strokeColor);
                group.appendChild(circle);

                const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                text.setAttribute('x', node.x);
                text.setAttribute('y', node.y + 4);
                text.setAttribute('text-anchor', 'middle');

                if (node.type === 'output' && state.classData) {
                    text.setAttribute('font-size', '14px');
                    text.setAttribute('font-weight', 'bold');
                    text.setAttribute('fill', '#ffffff');
                    text.textContent = `C:${state.classData.assignedClass}`;
                } else {
                    text.setAttribute('class', 'mono');
                    text.setAttribute('font-size', '11px');
                    text.setAttribute('fill', '#212529');
                    text.textContent = node.value.toFixed(2);
                }
                group.appendChild(text);

                const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                label.setAttribute('x', node.x);
                label.setAttribute('y', node.y - 28);
                label.setAttribute('font-size', '11px');
                label.setAttribute('font-weight', '600');
                label.setAttribute('text-anchor', 'middle');
                label.setAttribute('fill', '#495057');

                if(node.type === 'input') label.textContent = `z_${node.id.split('_')[1]}`;
                else if(node.type === 'output') label.textContent = state.classData ? `y (Class ${state.classData.assignedClass})` : `ŷ (scalar)`;
                else label.textContent = node.id;

                group.appendChild(label);
                mainSvg.appendChild(group);
            });
        } else {
            const ph = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            ph.setAttribute('x', 500);
            ph.setAttribute('y', 200);
            ph.setAttribute('text-anchor', 'middle');
            ph.setAttribute('fill', '#adb5bd');
            ph.setAttribute('font-size', '15px');
            ph.textContent = "";
            mainSvg.appendChild(ph);
        }

        // Render 1D Discretization Axis
        const padX = 60;
        const drawWidth = 1000 - (padX * 2);
        const lineY = 408;

        const axis = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        axis.setAttribute('x1', padX);
        axis.setAttribute('y1', lineY);
        axis.setAttribute('x2', 1000 - padX);
        axis.setAttribute('y2', lineY);
        axis.setAttribute('stroke', '#343a40');
        axis.setAttribute('stroke-width', '2px');
        mainSvg.appendChild(axis);

        if (state.continuousOutput !== null && state.axisDomain !== null) {
            // 5. Use fixed axis domain established at Step 5
            let minVal = state.axisDomain.min;
            let maxVal = state.axisDomain.max;
            let range = maxVal - minVal;
            const mapX = (val) => padX + ((val - minVal) / range) * drawWidth;

            if (state.classData) {
                let { numClasses, bounds, assignedClass } = state.classData;
                let extBounds = [minVal, ...bounds, maxVal];

                for(let c = 0; c < numClasses; c++) {
                    let x1 = mapX(extBounds[c]);
                    let x2 = mapX(extBounds[c+1]);
                    let isTarget = (c === assignedClass);

                    const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                    rect.setAttribute('x', x1);
                    rect.setAttribute('y', lineY - 35);
                    rect.setAttribute('width', Math.max(0, x2 - x1));
                    rect.setAttribute('height', 70);
                    rect.setAttribute('fill', isTarget ? '#d4edda' : (c % 2 === 0 ? '#f8f9fa' : '#e9ecef'));
                    rect.setAttribute('stroke', isTarget ? '#28a745' : '#dee2e6');
                    rect.setAttribute('stroke-width', isTarget ? '2px' : '1px');
                    mainSvg.insertBefore(rect, axis);

                    const classLbl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                    classLbl.setAttribute('x', x1 + (x2 - x1) / 2);
                    classLbl.setAttribute('y', lineY - 42);
                    classLbl.setAttribute('text-anchor', 'middle');
                    classLbl.setAttribute('font-size', '12px');
                    classLbl.setAttribute('font-weight', isTarget ? 'bold' : 'normal');
                    classLbl.setAttribute('fill', isTarget ? '#155724' : '#495057');
                    classLbl.textContent = `Class ${c}`;
                    mainSvg.appendChild(classLbl);
                }

                bounds.forEach((b, idx) => {
                    let bx = mapX(b);
                    const bLine = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                    bLine.setAttribute('x1', bx);
                    bLine.setAttribute('y1', lineY - 35);
                    bLine.setAttribute('x2', bx);
                    bLine.setAttribute('y2', lineY + 35);
                    bLine.setAttribute('stroke', '#dc3545');
                    bLine.setAttribute('stroke-width', '2px');
                    bLine.setAttribute('stroke-dasharray', '3,3');
                    mainSvg.appendChild(bLine);

                    const bTxt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                    bTxt.setAttribute('x', bx);
                    bTxt.setAttribute('y', lineY + 50);
                    bTxt.setAttribute('text-anchor', 'middle');
                    bTxt.setAttribute('font-size', '11px');
                    bTxt.setAttribute('class', 'mono');
                    bTxt.setAttribute('fill', '#dc3545');
                    bTxt.textContent = `B${idx}: ${b.toFixed(2)}`;
                    mainSvg.appendChild(bTxt);
                });
            }

            // 5. Plot continuous output prediction point ŷ (Remains at exact absolute coordinate)
            let yx = mapX(state.continuousOutput);
            const yLine = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            yLine.setAttribute('x1', yx);
            yLine.setAttribute('y1', lineY - 20);
            yLine.setAttribute('x2', yx);
            yLine.setAttribute('y2', lineY + 20);
            yLine.setAttribute('stroke', '#007bff');
            yLine.setAttribute('stroke-width', '3px');
            mainSvg.appendChild(yLine);

            const yPoint = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            yPoint.setAttribute('cx', yx);
            yPoint.setAttribute('cy', lineY);
            yPoint.setAttribute('r', 6);
            yPoint.setAttribute('fill', '#007bff');
            yPoint.setAttribute('stroke', '#ffffff');
            yPoint.setAttribute('stroke-width', '2px');
            mainSvg.appendChild(yPoint);

            const yTxt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            yTxt.setAttribute('x', yx);
            yTxt.setAttribute('y', lineY - 26);
            yTxt.setAttribute('text-anchor', 'middle');
            yTxt.setAttribute('font-size', '12px');
            yTxt.setAttribute('class', 'mono');
            yTxt.setAttribute('fill', '#007bff');
            yTxt.textContent = `ŷ: ${state.continuousOutput.toFixed(3)}`;
            mainSvg.appendChild(yTxt);
        } else {
            const ph = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            ph.setAttribute('x', 500);
            ph.setAttribute('y', lineY - 15);
            ph.setAttribute('text-anchor', 'middle');
            ph.setAttribute('fill', '#adb5bd');
            ph.setAttribute('font-size', '13px');
            ph.textContent = 'Awaiting continuous scalar target (ŷ) from Phase II forward propagation...';
            mainSvg.appendChild(ph);
        }
    }

    updateUIState();
</script>
</body>
</html>
