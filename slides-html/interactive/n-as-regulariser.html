<!DOCTYPE html>
<!-- ===================================================================
  interactive/n-as-regulariser.html — slide-embedded adaptation of
  slides/figures/statistical_foundations/n-as-regulariser.html (context
  size as an implicit complexity regularizer).
  Opened as a click-to-open iframe pop-up (js/loader.js data-modal-src,
  css/theme.css .viz-modal*) from the 4th item of the "PFN Approximation
  of the PPD" list slide (sections/statistical_foundations.html
  #sf-approx) — not a dedicated slide.

  CHANGES vs the standalone source:
    - stripped page margins/scrolling: body fills the iframe box
      (height:100%, overflow:hidden) instead of a scrollable page;
    - #controls-container padding trimmed to leave room for the plot;
    - de-boxed: dropped the svg card border/shadow, the legend's
      bordered/shadowed panel, and the controls' bordered/shadowed
      panel, since nesting three framed boxes inside the slide's own
      iframe box read as clutter. Legend is now a plain inline strip
      above the plot; controls are separated from the plot by a single
      hairline instead of a full box. No more max-width cap on the
      three sections either, so the plot fills whatever width the
      slide's iframe box actually gives it;
    - the svg's viewBox is no longer a fixed 1000x500: computeGeometry()
      measures #viz-container's real aspect ratio after layout and
      picks a viewBox width to match (height pinned at 500 logical
      units), so the plot uses the full available width instead of
      being letterboxed down to whatever narrow strip a 2:1 viewBox
      leaves inside this slide's much wider/shorter box;
    - data reveal order is shuffled (see shuffle() below) so
      increasing n scatters points across x instead of sweeping
      left-to-right;
    - sigma tuned up from 0.18 to 0.35 (was previously mis-tuned to a
      hard n>=30 gate that literally froze the posterior below n=30 —
      reverted, that's not real regularization). At 0.35 every n
      still contributes to the likelihood, but each individual point's
      evidence is weak enough relative to the prior's complexity
      penalty that the posterior stays broad/near-constant for the
      first ~10 points and only gradually sharpens into a tight fit
      by n≈30-40.

  HOW TO ADJUST: simulation logic (candidate generation, posterior
  weighting) is verbatim from the source file except `sigma` — tweak
  there and re-copy if the two should stay in sync, then re-check the
  E[complexity]/RMSE-vs-n curve if you change sigma, since it controls
  where the "still simple" -> "well-fit" transition lands.
=================================================================== -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PFN Complexity Regularization via Sample Size</title>
    <style>
        html, body {
            height: 100%;
            overflow: hidden;
        }
        body {
            margin: 0;
            padding: 8px 16px;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            color: #0f172a;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #legend {
            width: 100%;
            flex: 0 0 auto;
            display: flex;
            justify-content: center;
            gap: 28px;
            font-size: 13px;
            color: #334155;
            padding-bottom: 6px;
        }
        .legend-item {
            display: flex;
            align-items: center;
        }
        .legend-color {
            width: 16px;
            height: 3px;
            margin-right: 8px;
            border-radius: 2px;
        }
        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 8px;
        }
        #viz-container {
            width: 80%;
            flex: 1 1 auto;
            min-height: 0;
            position: relative;
            display: flex;
        }
        svg {
            width: 100%;
            height: 100%;
            background: #ffffff;
        }
        #controls-container {
            width: 60%;
            flex: 0 0 auto;
            margin-top: 8px;
            border-top: 1px solid #e2e8f0;
            padding: 10px 4px 2px;
            box-sizing: border-box;
            display: grid;
            grid-template-columns: 1fr auto auto;
            gap: 24px;
            align-items: center;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .control-label {
            font-size: 14px;
            font-weight: 600;
            color: #1e293b;
            display: flex;
            justify-content: space-between;
        }
        input[type=range] {
            width: 100%;
            cursor: pointer;
        }
        .metric-box {
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding-left: 16px;
            border-left: 1px solid #e2e8f0;
        }
        .metric-title {
            font-size: 12px;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }
        .metric-value {
            font-size: 16px;
            font-weight: 700;
            color: #0f172a;
        }
    </style>
</head>
<body>

<div id="legend">
    <div class="legend-item">
        <div class="legend-color" style="background: #f97316; height: 4px;"></div>
        <span>Posterior Predictive (Consensus)</span>
    </div>
    <div class="legend-item">
        <div class="legend-color" style="background: #64748b; opacity: 0.4;"></div>
        <span>Candidate Hypotheses (150 functions)</span>
    </div>
    <div class="legend-item">
        <div class="dot" style="background: #ef4444;"></div>
        <span>Observed Data Points</span>
    </div>
</div>

<div id="viz-container">
    <svg id="vector-plot" viewBox="0 0 1000 500" preserveAspectRatio="xMidYMid meet">
        <g id="grid-lines"></g>
        <g id="candidates-layer"></g>
        <path id="ppd-line" fill="none" stroke="#f97316" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"></path>
        <g id="data-points-layer"></g>
    </svg>
</div>

<div id="controls-container">
    <div class="control-group">
        <div class="control-label">
            <span>Observed Sample Size (n)</span>
            <span id="n-val">1</span>
        </div>
        <input type="range" id="n-slider" min="1" max="40" value="1">
    </div>
    <div class="metric-box">
        <span class="metric-title">Active Hypotheses</span>
        <span id="active-models" class="metric-value">150</span>
    </div>
    <div class="metric-box">
        <span class="metric-title">Dominant Shape Behavior</span>
        <span id="complexity-val" class="metric-value">Constant Prior Average</span>
    </div>
</div>

<script>
    const N_TOTAL_POINTS = 40;
    const NUM_CANDIDATES = 150;
    const dataPoints = [];
    const candidates = [];

    let seed = 1042;
    function random() {
        let x = Math.sin(seed++) * 10000;
        return x - Math.floor(x);
    }

    function targetFunction(x) {
        return 0.5 + 0.22 * Math.sin(2 * Math.PI * x) + 0.12 * Math.cos(6 * Math.PI * x) + 0.06 * Math.sin(12 * Math.PI * x);
    }

    for (let i = 0; i < N_TOTAL_POINTS; i++) {
        const x = (i + 0.5) / N_TOTAL_POINTS;
        const y = targetFunction(x) + (random() - 0.5) * 0.05;
        dataPoints.push({ x, y });
    }

    // Reveal order is randomized (not left-to-right by x) so that
    // increasing n scatters observations across the whole domain.
    function shuffle(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }
    shuffle(dataPoints);

    for (let i = 0; i < NUM_CANDIDATES; i++) {
        const complexity = Math.floor((i / NUM_CANDIDATES) * 18);
        const priorWeight = Math.exp(-0.2 * complexity);

        const coeffs = [];
        for (let c = 0; c <= complexity; c++) {
            coeffs.push({
                sin: (random() - 0.5) * (1.5 / (c + 1)),
                cos: (random() - 0.5) * (1.5 / (c + 1)),
                freq: c
            });
        }

        const isExactMatch = i > NUM_CANDIDATES - 15;

        candidates.push({
            complexity,
            priorWeight,
            eval: (x) => {
                if (isExactMatch) {
                    const noise = Math.sin(i * 15 + x * 25) * 0.015;
                    return targetFunction(x) + noise;
                }
                let val = 0.5;
                for (let c of coeffs) {
                    val += c.sin * Math.sin(2 * Math.PI * c.freq * x) + c.cos * Math.cos(2 * Math.PI * c.freq * x);
                }
                return val;
            }
        });
    }

    const svg = document.getElementById('vector-plot');
    const vizContainer = document.getElementById('viz-container');
    const gridLayer = document.getElementById('grid-lines');
    const candidatesLayer = document.getElementById('candidates-layer');
    const ppdLine = document.getElementById('ppd-line');
    const pointsLayer = document.getElementById('data-points-layer');

    const slider = document.getElementById('n-slider');
    const nValDisplay = document.getElementById('n-val');
    const activeModelsDisplay = document.getElementById('active-models');
    const complexityDisplay = document.getElementById('complexity-val');

    // Logical viewBox is sized to match #viz-container's real aspect
    // ratio (height pinned at 500 units) so the plot fills the whole
    // available width instead of being letterboxed by a fixed 2:1 box.
    let width = 1000;
    let height = 500;
    let padX = 50;
    let padY = 40;
    let plotW = width - padX * 2;
    let plotH = height - padY * 2;

    const toScreenX = (val) => padX + val * plotW;
    const toScreenY = (val) => height - (padY + val * plotH);

    function computeGeometry() {
        const rect = vizContainer.getBoundingClientRect();
        const aspect = (rect.width > 0 && rect.height > 0) ? rect.width / rect.height : 2;
        height = 500;
        width = Math.round(height * aspect);
        padX = width * 0.05;
        padY = height * 0.08;
        plotW = width - padX * 2;
        plotH = height - padY * 2;
        svg.setAttribute('viewBox', `0 0 ${width} ${height}`);
    }

    function buildGrid() {
        let gridHtml = '';
        for (let i = 0; i <= 10; i++) {
            let y = toScreenY(i / 10);
            gridHtml += `<line x1="${padX}" y1="${y}" x2="${width - padX}" y2="${y}" stroke="#e2e8f0" stroke-width="1" />`;
        }
        for (let i = 0; i <= 10; i++) {
            let x = toScreenX(i / 10);
            gridHtml += `<line x1="${x}" y1="${padY}" x2="${x}" y2="${height - padY}" stroke="#f1f5f9" stroke-width="1" />`;
        }
        gridLayer.innerHTML = gridHtml;
    }

    const resolution = 200;
    const candidatePaths = [];

    function initCandidateDOM() {
        for (let i = 0; i < NUM_CANDIDATES; i++) {
            const pathNode = document.createElementNS("http://www.w3.org/2000/svg", "path");
            pathNode.setAttribute("fill", "none");
            pathNode.setAttribute("stroke-linecap", "round");
            candidatesLayer.appendChild(pathNode);
            candidatePaths.push(pathNode);
        }
    }

    function generatePathString(evalFunc) {
        let d = '';
        for (let j = 0; j <= resolution; j++) {
            const x = j / resolution;
            const y = evalFunc(x);
            const sx = toScreenX(x).toFixed(1);
            const sy = toScreenY(y).toFixed(1);
            d += (j === 0 ? `M ${sx} ${sy}` : ` L ${sx} ${sy}`);
        }
        return d;
    }

    let candidatePathStrings = [];
    function regenerateCandidatePaths() {
        candidatePathStrings = candidates.map(c => generatePathString(c.eval));
    }

    function update() {
        const n = parseInt(slider.value);
        nValDisplay.innerText = n;

        const activeData = dataPoints.slice(0, n);
        // Every point contributes to the likelihood from n=1; sigma
        // controls how quickly the posterior sharpens (see file header).
        const sigma = 0.35;

        let maxLogPost = -Infinity;
        const logPosts = candidates.map(c => {
            let logLikelihood = 0;
            for (let pt of activeData) {
                const diff = pt.y - c.eval(pt.x);
                logLikelihood -= (diff * diff) / (2 * sigma * sigma);
            }
            const logPost = Math.log(c.priorWeight) + logLikelihood;
            if (logPost > maxLogPost) maxLogPost = logPost;
            return logPost;
        });

        let weightSum = 0;
        const weights = logPosts.map(lp => {
            const w = Math.exp(lp - maxLogPost);
            weightSum += w;
            return w;
        });
        weights.forEach((w, idx) => weights[idx] = w / weightSum);

        const activeCount = weights.filter(w => w > 0.001).length;
        activeModelsDisplay.innerText = activeCount;

        let expectedComplexity = 0;
        weights.forEach((w, idx) => expectedComplexity += w * candidates[idx].complexity);

        if (n === 1) {
            complexityDisplay.innerText = "Constant Prior Average";
        } else if (expectedComplexity < 4) {
            complexityDisplay.innerText = "Low-Capacity / Linear";
        } else if (expectedComplexity < 8) {
            complexityDisplay.innerText = "Moderate Resolution";
        } else {
            complexityDisplay.innerText = "High-Frequency Localized";
        }

        candidates.forEach((c, idx) => {
            const w = weights[idx];
            const pathNode = candidatePaths[idx];

            if (w < 0.001) {
                pathNode.setAttribute("d", "");
            } else {
                const opacity = Math.min(0.6, Math.max(0.03, w * 15)).toFixed(3);
                const strokeWidth = Math.min(2.5, Math.max(0.75, w * 10)).toFixed(1);
                pathNode.setAttribute("d", candidatePathStrings[idx]);
                pathNode.setAttribute("stroke", `rgba(100, 116, 139, ${opacity})`);
                pathNode.setAttribute("stroke-width", strokeWidth);
            }
        });

        let ppdPathString = '';
        for (let j = 0; j <= resolution; j++) {
            const x = j / resolution;
            let y = 0;
            candidates.forEach((c, idx) => {
                y += weights[idx] * c.eval(x);
            });
            const sx = toScreenX(x).toFixed(1);
            const sy = toScreenY(y).toFixed(1);
            ppdPathString += (j === 0 ? `M ${sx} ${sy}` : ` L ${sx} ${sy}`);
        }
        ppdLine.setAttribute("d", ppdPathString);

        let pointsHtml = '';
        activeData.forEach(pt => {
            const sx = toScreenX(pt.x).toFixed(1);
            const sy = toScreenY(pt.y).toFixed(1);
            pointsHtml += `<circle cx="${sx}" cy="${sy}" r="5" fill="#ef4444" stroke="#ffffff" stroke-width="1.5" />`;
        });
        pointsLayer.innerHTML = pointsHtml;
    }

    function layout() {
        computeGeometry();
        buildGrid();
        regenerateCandidatePaths();
        update();
    }

    let resizeRaf = null;
    window.addEventListener('resize', () => {
        if (resizeRaf) cancelAnimationFrame(resizeRaf);
        resizeRaf = requestAnimationFrame(layout);
    });

    slider.addEventListener('input', update);
    initCandidateDOM();
    layout();
</script>
</body>
</html>
