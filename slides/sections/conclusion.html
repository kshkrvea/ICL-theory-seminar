<!-- ===================================================================
  sections/conclusion.html — port of slides/sections/conclusion.tex
  (2 frames: Conclusion + References).

  The reference list is generated by js/cite.js from references.bib:
  every entry cited somewhere in the deck via a
  `<span class="cite" data-cite="bibKey">` marker appears here,
  numbered by first appearance. Nothing to keep in sync by hand.
=================================================================== -->

<section id="conclusion">
  <header class="frame-head">
    <h2 class="frame-title">Conclusion</h2>
  </header>
  <div class="frame-body">
    <ul>
      <li>to</li>
      <li>be</li>
      <li>done</li>
    </ul>
  </div>
</section>

<section id="references">
  <header class="frame-head">
    <h2 class="frame-title">References</h2>
  </header>
  <div class="frame-body references" data-references>
    <!-- filled by js/cite.js: cited entries from references.bib,
         numbered by first appearance in the deck -->
  </div>
</section>
