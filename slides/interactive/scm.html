<!DOCTYPE html>
<!-- ===================================================================
  interactive/scm.html — slide-embedded adaptation of
  slides/figures/tabpfn/scm/scm.html (SCM prior construction pipeline).
  Embedded as a full-slide iframe on the TabPFN "Structural Causal
  Models Prior" slide (sections/tabpfn.html #tp-scm), replacing the
  8-step SCM_Prior_Step_*.pdf flip.

  CHANGES vs the standalone source (simulation logic untouched):
    - stripped the PDF-export chrome (jsPDF/svg2pdf scripts, the
      export button/group and its handler);
    - stripped the standalone <h2> page heading and page margins;
    - compact 220px controls column, no execution ledger;
    - buttons: white/dark default; .next-step = dark fill (see updateUIState).

  HOW TO ADJUST: controls column width in .controls { width }.
  Simulation logic was reworked 2026-07 and no longer matches the
  standalone source file: hyperparameters follow the paper's meta-prior
  table (TNLU / Beta samplers), the class partition + categorical bins
  are calibrated at Step 3 from a hidden probe batch, and Phase II→III
  loops per sample.
=================================================================== -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SCM Prior Construction & Target Discretization Pipeline</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/lmroman10@5.2.5/400.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/lmroman10@5.2.5/700.css">
    <style>
        :root {
            --mDarkTeal: #23373b;
            --mDarkTealHover: #1a292c;
            --mAlert: #eb811b;
            --mAlertHover: #c96d0f;
        }
        html, body {
            height: 100%;
        }
        body {
            font-family: 'LM Roman 10', 'Latin Modern Roman', Georgia, serif;
            margin: 0;
            background-color: #ffffff;
            color: #212529;
            text-rendering: geometricPrecision;
            -webkit-font-smoothing: antialiased;
        }
        /* Layout: graph + scatter on top (equal height), the controls as a
           horizontal bar underneath. Freeing the left column lets the graph
           use the full width and scale up (requirement 1). */
        .container {
            display: flex;
            flex-direction: column;
            gap: 8px;
            height: 100%;
            box-sizing: border-box;
            padding: 6px;
        }
        .top-row {
            flex: 1 1 auto;
            display: flex;
            gap: 10px;
            min-height: 0;
        }
        .visualization-panel {
            flex: 1.9;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }
        /* right-hand 2D scatter of the generated dataset */
        .dataset-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-width: 0;
        }
        /* controls: horizontal bar of button groups along the bottom */
        .controls {
            flex: 0 0 auto;
            background: #ffffff;
            padding: 6px 10px;
            border-radius: 6px;
            border: 1px solid #e2e5e6;
            display: flex;
            flex-direction: row;
            gap: 12px;
            box-sizing: border-box;
            overflow-x: auto;
        }
        /* X / Y covariate pickers above the scatter (requirement 3) */
        .axis-picker {
            display: flex;
            gap: 12px;
            align-items: center;
            flex: 0 0 auto;
            padding: 0 2px;
        }
        .axis-picker label {
            display: inline;
            margin: 0 4px 0 0;
            font-size: 0.68rem;
            text-transform: none;
            letter-spacing: 0;
        }
        .axis-picker select {
            padding: 3px 4px;
            border: 1px solid #ced4da;
            border-radius: 4px;
            font-size: 0.72rem;
            background: #ffffff;
            color: var(--mDarkTeal);
        }
        .bulk-row {
            display: flex;
            gap: 4px;
            align-items: stretch;
        }
        .bulk-row input {
            width: 46px;
            flex: 0 0 auto;
            padding: 4px 5px;
            border: 1px solid #ced4da;
            border-radius: 4px;
            font-size: 0.72rem;
            box-sizing: border-box;
        }
        .bulk-row button { margin-bottom: 0; }
        /* saved-examples dropdown: match the button column width/typography */
        #saved-select {
            width: 100%;
            box-sizing: border-box;
            padding: 4px 5px;
            margin-bottom: 2px;
            border: 1px solid #ced4da;
            border-radius: 4px;
            font-size: 0.72rem;
            background: #ffffff;
            color: var(--mDarkTeal);
        }
        .canvas-box {
            background: #ffffff;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #e2e5e6;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            flex: 1;
            min-height: 0;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 2px;
            flex: 1 1 0;
            min-width: 150px;
            padding-right: 12px;
            border-right: 1px solid #e9ecef;
        }
        .control-group:last-child {
            border-right: none;
            padding-right: 0;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 4px;
            font-size: 0.62rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #495057;
        }
        button {
            width: 100%;
            padding: 4px 8px;
            border-radius: 4px;
            border: 1px solid #ced4da;
            box-sizing: border-box;
            background-color: #ffffff;
            color: var(--mDarkTeal);
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s, border-color 0.2s, color 0.2s;
            margin-bottom: 2px;
            text-align: left;
            font-size: 0.72rem;
        }
        button:hover:not(:disabled):not(.next-step) {
            background-color: #f3f4f5;
            border-color: #adb5bd;
        }
        button:disabled {
            background-color: #ffffff;
            color: var(--mDarkTeal);
            border-color: #dee2e6;
            opacity: 0.45;
            cursor: not-allowed;
        }
        button.next-step {
            background-color: var(--mDarkTeal);
            color: #ffffff;
            border-color: var(--mDarkTeal);
            opacity: 1;
        }
        button.next-step:hover:not(:disabled) {
            background-color: var(--mDarkTealHover);
            border-color: var(--mDarkTealHover);
        }
        /* one-click orchestrator buttons: prominent accent call-to-action */
        button.run-btn {
            background-color: var(--mAlert);
            color: #ffffff;
            border-color: var(--mAlert);
            opacity: 1;
        }
        button.run-btn:hover:not(:disabled) {
            background-color: var(--mAlertHover);
            border-color: var(--mAlertHover);
        }
        button.run-btn:disabled {
            background-color: var(--mAlert);
            color: #ffffff;
            border-color: var(--mAlert);
            opacity: 0.4;
        }
        /* NB: usage instructions live on the SLIDE (sections/tabpfn.html #tp-scm,
           .audience-qa "?" pop-up), not in here — this page is the embedded iframe. */
        svg {
            border: 1px solid #e9ecef;
            border-radius: 4px;
            background-color: #ffffff;
            width: 100%;
            height: 100%;
            max-height: 100%;
            shape-rendering: geometricPrecision;
            text-rendering: geometricPrecision;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="top-row">
        <div class="visualization-panel">
            <div class="canvas-box">
                <svg id="main-svg" viewBox="0 0 1000 470" xmlns="http://www.w3.org/2000/svg"></svg>
            </div>
        </div>

        <div class="dataset-panel">
            <div class="axis-picker">
                <span><label for="axis-x">X&nbsp;axis</label><select id="axis-x"></select></span>
                <span><label for="axis-y">Y&nbsp;axis</label><select id="axis-y"></select></span>
            </div>
            <div class="canvas-box">
                <svg id="dataset-svg" viewBox="0 0 460 470" xmlns="http://www.w3.org/2000/svg"></svg>
            </div>
        </div>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>Quick Run</label>
            <button id="btn-run-phase1" class="run-btn">▶ Sample Prior &nbsp;(Phase I)</button>
            <button id="btn-run-sample" class="run-btn" disabled>▶ Draw Data Point &nbsp;(Phase II→III)</button>
            <div class="bulk-row">
                <input id="bulk-k" type="number" min="1" max="2000" value="50"
                       title="how many points to add to the scatter" disabled>
                <button id="btn-bulk" class="run-btn" disabled>▶ Generate k points</button>
            </div>
        </div>

        <div class="control-group">
            <label>Phase I: SCM DAG Generation</label>
            <button id="btn-sample-hyper">Step 1: Sample Meta-Prior Hyperparameters</button>
            <button id="btn-build-dense" disabled>Step 2: Build Network Topology</button>
            <button id="btn-dropout-edges" disabled>Step 3: Edge Dropout</button>
        </div>

        <div class="control-group">
            <label>Phase II: Causal Data Generation</label>
            <button id="btn-sample-noise" disabled>Step 4: Sample Exogenous Noise (ε)</button>
            <button id="btn-flow-data" disabled>Step 5: Causal Forward Propagation</button>
        </div>

        <div class="control-group">
            <label>Phase III: Target Discretization</label>
            <button id="btn-transform-class" disabled>Step 6: Transform Continuous z_y to Class</button>
        </div>

        <div class="control-group">
            <label>Saved Examples</label>
            <button id="btn-save-prior" disabled>★ Save current prior</button>
            <select id="saved-select" title="pick a saved prior to load"></select>
            <div class="bulk-row">
                <button id="btn-load-saved" disabled>Load</button>
                <button id="btn-delete-saved" disabled>Delete</button>
            </div>
        </div>
    </div>
</div>

<script>
    // ---- seedable RNG -------------------------------------------------------
    // The whole pipeline draws from Math.random(). To make a "good-looking"
    // prior reproducible we override Math.random with a seedable generator
    // (mulberry32). While unseeded (_rngState === null) it delegates to the real
    // Math.random, so behaviour is unchanged until a run seeds it. Seeding at the
    // start of Phase I makes the entire prior — topology, weights, edge dropout,
    // class partition and categorical bins — a deterministic function of the seed.
    const _origRandom = Math.random.bind(Math);
    let _rngState = null;                     // null → use the real Math.random
    function _mulberry32() {
        _rngState = (_rngState + 0x6D2B79F5) | 0;
        let t = Math.imul(_rngState ^ (_rngState >>> 15), 1 | _rngState);
        t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    }
    Math.random = function () { return _rngState === null ? _origRandom() : _mulberry32(); };
    function seedRng(seed) { _rngState = seed | 0; }
    function freshSeed() { return (_origRandom() * 4294967296) >>> 0; }

    // A saved example, when selected, is not rebuilt on screen — instead its seed
    // is QUEUED here. The next Phase-I run (Step 1 / "Sample Prior") consumes it,
    // so the presenter walks through the pipeline live and it deterministically
    // yields that curated prior. Cleared after one use → later runs are fresh.
    let pendingSeed = null;

    let state = {
        step: 0,
        stepTitle: "System Idle",
        layers: 0,
        hiddenUnits: 0,
        activation: 'Identity',
        dropoutRate: 0.0,
        graph: null,
        currentPropagationLayer: -1,
        continuousOutput: null,
        forwardComplete: false, // set once causal generation reaches the target; blocks re-runs within a sample
        autoRunning: false,     // a one-click orchestrator (Phase I / draw-sample) is mid-sequence
        sampleCount: 0,         // how many data samples have been drawn from the CURRENT prior (Phase I)
        priorSeed: null,        // RNG seed that reproduces the CURRENT prior (set at Step 1)
        sigmaW: 1.0,            // weights std        ~ TNLU(0.01, 10)     (paper Table)
        sigmaEps: 0.1,          // exogenous noise std ~ TNLU(0.0001, 0.3) (paper Table)
        numClasses: 0,          // N_c, sampled at Step 1
        classSplit: null,       // {numClasses, bounds} — FIXED at Step 3 from the probe batch
        catFeatures: null,      // per-feature: null (numeric) or {nCat, bounds} (categorical)
        classData: null,
        axisDomain: null, // probe-calibrated [min,max]; fixed at Step 3, never rescaled per sample
        datasetPoints: [] // accumulated {x, y, cls} shown in the right-panel 2D scatter
    };

    const activations = ['Tanh', 'Leaky ReLU', 'ELU', 'Identity'];

    const btnSampleHyper = document.getElementById('btn-sample-hyper');
    const btnBuildDense = document.getElementById('btn-build-dense');
    const btnDropoutEdges = document.getElementById('btn-dropout-edges');
    const btnSampleNoise = document.getElementById('btn-sample-noise');
    const btnFlowData = document.getElementById('btn-flow-data');
    const btnTransformClass = document.getElementById('btn-transform-class');
    const btnRunPhase1 = document.getElementById('btn-run-phase1');
    const btnRunSample = document.getElementById('btn-run-sample');
    const btnBulk = document.getElementById('btn-bulk');
    const bulkK = document.getElementById('bulk-k');
    const mainSvg = document.getElementById('main-svg');
    const dsSvg = document.getElementById('dataset-svg');
    const axisX = document.getElementById('axis-x');
    const axisY = document.getElementById('axis-y');
    const btnSavePrior = document.getElementById('btn-save-prior');
    const btnLoadSaved = document.getElementById('btn-load-saved');
    const btnDeleteSaved = document.getElementById('btn-delete-saved');
    const savedSelect = document.getElementById('saved-select');
    const allStepButtons = [
        btnSampleHyper, btnBuildDense, btnDropoutEdges,
        btnSampleNoise, btnFlowData, btnTransformClass,
    ];

    function logToLedger() { /* ledger removed for slide embed */ }

    function highlightNextStep() {
        allStepButtons.forEach(b => b.classList.remove('next-step'));
        let next = null;
        if (state.step === 0) next = btnSampleHyper;
        else if (state.step === 1) next = btnBuildDense;
        else if (state.step === 2) next = btnDropoutEdges;
        else if (state.step === 3) next = btnSampleNoise;
        else if (!state.forwardComplete) next = btnFlowData;        // step >= 4, still propagating
        else if (!state.classData) next = btnTransformClass;        // generation done, not yet discretized
        else next = btnSampleNoise;                                 // sample done → draw the NEXT sample (loop Phase II→III)
        if (next && !next.disabled) next.classList.add('next-step');
    }

    function updateUIState() {
        // While a one-click sequence plays, every button is locked.
        const auto = state.autoRunning;
        btnSampleHyper.disabled = auto;
        btnBuildDense.disabled = auto || state.step < 1;
        btnDropoutEdges.disabled = auto || state.step < 2;
        btnSampleNoise.disabled = auto || state.step < 3;
        // Step 5 stays clickable while propagating, but locks once generation completes.
        btnFlowData.disabled = auto || state.step < 4 || state.forwardComplete;
        // Step 6 unlocks only after generation, and locks again once the label is assigned.
        btnTransformClass.disabled = auto || !state.forwardComplete || state.classData !== null;
        // One-click shortcuts: Phase I always available; draw-sample needs a built prior.
        btnRunPhase1.disabled = auto;
        btnRunSample.disabled = auto || state.step < 3 || !state.graph;
        // requirement 3: bulk generation needs a built prior with a fixed partition
        btnBulk.disabled = auto || state.step < 3 || !state.graph;
        bulkK.disabled = btnBulk.disabled;
        // Saving needs a finished prior (Step 3+) with a seed to reproduce it.
        btnSavePrior.disabled = auto || state.step < 3 || !state.graph || state.priorSeed === null;
        highlightNextStep();
    }

    function applyActivation(x, type) {
        switch(type) {
            case 'Tanh': return Math.tanh(x);
            case 'Leaky ReLU': return x >= 0 ? x : 0.1 * x;
            case 'ELU': return x >= 0 ? x : 1.0 * (Math.exp(x) - 1);
            case 'Identity':
            default: return x;
        }
    }

    // ---- meta-prior samplers (TabPFN paper, Table "prior hyperparameter
    //      distribution"; see library/raw/papers-2207-01848v6.../main.tex) ----
    function randn() {
        const u1 = Math.max(1e-12, Math.random());
        const u2 = Math.random();
        return Math.sqrt(-2 * Math.log(u1)) * Math.cos(2 * Math.PI * u2);
    }
    function logUniform(a, b) {
        return Math.exp(Math.log(a) + Math.random() * (Math.log(b) - Math.log(a)));
    }
    // TNLU(μ̌, μ̂, round, min): μ, σ ~ LogUniform(μ̌, μ̂); v ~ TruncNormal(μ, σ², a=0).
    // `cap` is a DISPLAY-ONLY ceiling (the paper allows e.g. 12 nodes per layer,
    // which cannot be drawn legibly in a 1000×470 SVG).
    function sampleTNLU(minMean, maxMean, doRound, minVal, cap) {
        const mu = logUniform(minMean, maxMean);
        const sigma = logUniform(minMean, maxMean);
        let v;
        do { v = mu + sigma * randn(); } while (v < 0);
        if (doRound) v = Math.round(v);
        v = Math.max(v, minVal);
        return cap !== undefined ? Math.min(v, cap) : v;
    }
    // Gamma(k, 1) via Marsaglia–Tsang (boosted for k<1), for Beta sampling
    function sampleGamma(k) {
        if (k < 1) return sampleGamma(k + 1) * Math.pow(Math.max(1e-12, Math.random()), 1 / k);
        const d = k - 1 / 3, c = 1 / Math.sqrt(9 * d);
        for (;;) {
            let x, v;
            do { x = randn(); v = 1 + c * x; } while (v <= 0);
            v = v * v * v;
            const u = Math.random();
            if (u < 1 - 0.0331 * x * x * x * x) return d * v;
            if (Math.log(u) < 0.5 * x * x + d * (1 - v + Math.log(v))) return d * v;
        }
    }
    function sampleBeta(a, b) {
        const x = sampleGamma(a), y = sampleGamma(b);
        return x / (x + y);
    }

    // Compact display formatters: σ_w up to ~10 means node values can span many
    // orders of magnitude, so fixed .toFixed(2) is no longer safe anywhere.
    function fmt(v) {
        const a = Math.abs(v);
        if (a >= 1e4) return v.toExponential(1);
        if (a >= 100) return v.toFixed(0);
        if (a >= 0.005 || a === 0) return v.toFixed(2);
        if (a >= 1e-4) return v.toFixed(4);
        return v.toExponential(1);
    }
    function fmtAxis(v) {  // decimals adapted to the (probe-calibrated) axis span
        const span = state.axisDomain ? Math.max(state.axisDomain.max - state.axisDomain.min, 1e-12) : 1;
        const a = Math.abs(v);
        if (a >= 1e5 || (a > 0 && a < 1e-4 && span < 1e-3)) return v.toExponential(1);
        const dec = span >= 100 ? 0 : span >= 1 ? 2 : Math.min(6, Math.ceil(-Math.log10(span)) + 2);
        return v.toFixed(dec);
    }

    // One silent causal generation through the finished DAG (fresh exogenous noise
    // at every node, no display state touched). Mirrors the visible Step-5 math:
    // z_i = f(Σ W_ij·z_j + ε_i) at every node. Used by calibratePartition.
    function probeForward() {
        const vals = {};
        for (let l = 0; l < state.graph.topology.length; l++) {
            state.graph.nodes.filter(n => n.layer === l).forEach(tN => {
                let dot = 0;
                state.graph.edges.forEach(e => {
                    if (e.target.id === tN.id && !e.dropped) dot += vals[e.source.id] * e.weight;
                });
                vals[tN.id] = applyActivation(dot + randn() * state.sigmaEps, state.activation);
            });
        }
        const target = state.graph.nodes.find(n => n.role === 'target');
        const feats = state.graph.nodes.filter(n => n.role === 'feature')
            .sort((a, b) => a.featureIdx - b.featureIdx).map(n => vals[n.id]);
        return { yhat: vals[target.id], feats };
    }

    // End of Phase I: draw a hidden probe batch and fix everything downstream
    // sampling depends on. Paper-faithful: class bounds are "sampled randomly from
    // the set of continuous targets" (Sec. Multi-class Prediction) — i.e. from
    // THIS SCM's actual z_y distribution, so drawn samples spread across classes
    // instead of clustering in one. Also fixes the axis window and the
    // categorical-feature bins (Appendix: "analogous to multiclass labels").
    function calibratePartition() {
        const K = 64;
        const probes = [];
        for (let i = 0; i < K; i++) probes.push(probeForward());
        const ys = probes.map(p => p.yhat).sort((a, b) => a - b);
        let lo = ys[0], hi = ys[K - 1];
        if (!(hi - lo > 1e-12)) { lo -= 0.5; hi += 0.5; }   // degenerate constant output
        const span = hi - lo;

        // N_c-1 bounds from the probe targets, kept ≥8% of the span apart so the
        // B_i tick labels stay readable; fall back to even spacing if the empirical
        // distribution is too clumped to satisfy the gaps.
        const n = state.numClasses - 1;
        const minGap = 0.08 * span;
        let bounds = null;
        for (let attempt = 0; attempt < 200 && !bounds; attempt++) {
            const cand = [];
            for (let j = 0; j < n; j++) cand.push(ys[1 + Math.floor(Math.random() * (K - 2))]);
            cand.sort((a, b) => a - b);
            let ok = cand[0] - lo >= minGap * 0.5 && hi - cand[n - 1] >= minGap * 0.5;
            for (let j = 1; j < n; j++) if (cand[j] - cand[j - 1] < minGap) ok = false;
            if (ok) bounds = cand;
        }
        if (!bounds) {
            bounds = [];
            for (let j = 1; j <= n; j++) bounds.push(lo + span * j / (n + 1));
        }
        state.classSplit = { numClasses: state.numClasses, bounds };
        state.axisDomain = { min: lo - 0.1 * span, max: hi + 0.1 * span };

        // Categorical features: a random fraction p_cat of features per dataset is
        // discretized like the target (bins from that feature's probe values).
        const featCount = state.graph.nodes.filter(nd => nd.role === 'feature').length;
        const pCat = Math.random() * 0.7;
        state.catFeatures = [];
        for (let f = 0; f < featCount; f++) {
            if (Math.random() < pCat) {
                const fv = probes.map(p => p.feats[f]).sort((a, b) => a - b);
                const nCat = 2 + Math.floor(Math.random() * 3);   // 2–4 categories
                const fb = [];
                for (let j = 0; j < nCat - 1; j++) fb.push(fv[1 + Math.floor(Math.random() * (K - 2))]);
                fb.sort((a, b) => a - b);
                state.catFeatures.push({ nCat, bounds: fb });
            } else {
                state.catFeatures.push(null);
            }
        }
    }

    function stepSampleHyper(seedArg) {
        // Seed the RNG that governs this entire prior. Seed priority:
        //   1. an explicit numeric argument (direct replay),
        //   2. a queued pendingSeed from a selected saved example (consumed once),
        //   3. otherwise a fresh random seed.
        // The click handler passes an Event object here, hence the typeof guard.
        let seed;
        if (typeof seedArg === 'number') seed = seedArg >>> 0;
        else if (pendingSeed !== null) { seed = pendingSeed >>> 0; pendingSeed = null; }
        else seed = freshSeed();
        seedRng(seed);
        state.priorSeed = seed;

        // Paper meta-prior (structural sizes display-scaled: the paper allows up
        // to 12 nodes per layer, which is not drawable in this SVG):
        //   SCM #nodes/layer  TNLU(1, 12, round, min 1) → here TNLU(1, 4) in [2, 4]
        state.layers = sampleTNLU(1, 2, true, 1, 3);
        state.hiddenUnits = sampleTNLU(1, 4, true, 2, 4);
        state.activation = activations[Math.floor(Math.random() * activations.length)];
        // weight dropout: 0.9 · Beta(a, b), a, b ~ Uniform(0.1, 5.0)
        state.dropoutRate = 0.9 * sampleBeta(0.1 + Math.random() * 4.9, 0.1 + Math.random() * 4.9);
        state.sigmaW = sampleTNLU(0.01, 10.0, false, 0.0);      // weights std
        state.sigmaEps = sampleTNLU(0.0001, 0.3, false, 0.0);   // exogenous noise std

        // N_c is part of the Step-1 draw; the concrete cut points come from the
        // probe batch at Step 3 (paper: bounds sampled from the z_y values).
        state.numClasses = Math.floor(Math.random() * 3) + 2;   // 2–4 classes (min 2)

        state.step = 1;
        state.stepTitle = "Step 1: Sample SCM Meta-Prior Hyperparameters";
        state.currentPropagationLayer = -1;
        state.continuousOutput = null;
        state.forwardComplete = false;
        state.sampleCount = 0;   // a new prior → restart the data-sample count
        state.classData = null;
        state.classSplit = null;
        state.catFeatures = null;
        state.axisDomain = null;
        state.graph = null;
        state.datasetPoints = [];   // a new prior → clear the accumulated scatter
        
        logToLedger(`[Step 1: Hyperparameters Sampled]\n` +
            `• SCM Depth (l): ${state.layers}\n` +
            `• SCM Width (h): ${state.hiddenUnits}\n` +
            `• Deterministic Function f_i: ${state.activation}\n` +
            `• Structural Edge Dropout Probability: ${state.dropoutRate * 100}%`);
        
        renderUnifiedCanvas();
        updateUIState();
    }

    function stepBuildDense() {
        const width = 1000;
        const height = 285;
        const offsetY = 72;
        
        let topology = [];
        for(let i = 0; i <= state.layers; i++) {
            topology.push({ type: 'latent', count: state.hiddenUnits });
        }

        let nodes = [];
        let edges = [];

        // Equal left/right margins (= layerSpacing) so the graph is horizontally
        // centered in the exported image.
        let layerSpacing = width / (topology.length + 1);

        topology.forEach((layer, lIdx) => {
            let x = layerSpacing * (lIdx + 1);
            let nodeSpacing = height / (layer.count + 1);
            
            for(let nIdx = 0; nIdx < layer.count; nIdx++) {
                let y = offsetY + nodeSpacing * (nIdx + 1);
                let id = `Z_L${lIdx}_N${nIdx}`;
                nodes.push({
                    id: id,
                    x: x,
                    y: y,
                    layer: lIdx,
                    role: 'latent',
                    value: 0.0,
                    noise: 0.0
                });
            }
        });

        const totalNodes = nodes.length;
        const featureCount = Math.min(4, totalNodes - 1);   // covariates for axis dropdowns
        let availableIndices = Array.from({length: totalNodes}, (_, i) => i);
        
        // Target node position is sampled uniformly over the whole graph (any layer),
        // matching the paper's "randomly sample feature and target node positions"
        // (Fig. 2, step 2). A target on an early/root layer is a valid, if less
        // informative, sample and is fully supported by the propagation below.
        let targetIdx = Math.floor(Math.random() * totalNodes);
        nodes[targetIdx].role = 'target';
        availableIndices.splice(availableIndices.indexOf(targetIdx), 1);

        for(let i = 0; i < featureCount; i++) {
            let randIdx = Math.floor(Math.random() * availableIndices.length);
            let fIdx = availableIndices[randIdx];
            nodes[fIdx].role = 'feature';
            nodes[fIdx].featureIdx = i;
            availableIndices.splice(randIdx, 1);
        }

        for(let l = 0; l < topology.length - 1; l++) {
            let currentLayerNodes = nodes.filter(n => n.layer === l);
            let nextLayerNodes = nodes.filter(n => n.layer === l + 1);
            
            currentLayerNodes.forEach(source => {
                nextLayerNodes.forEach(target => {
                    let w = randn() * state.sigmaW;   // weights ~ N(0, σ_w²), σ_w from Step 1

                    edges.push({
                        id: `E_${source.id}_${target.id}`,
                        source: source,
                        target: target,
                        weight: w,
                        dropped: false
                    });
                });
            });
        }

        state.graph = { nodes, edges, topology };
        state.step = 2;
        state.stepTitle = "Step 2: Build Dense Topology and Select Observed Variables (Z_X, z_y)";
        state.currentPropagationLayer = -1;
        state.continuousOutput = null;
        state.forwardComplete = false;
        state.sampleCount = 0;
        state.classData = null;
        state.classSplit = null;   // a rebuilt DAG invalidates the old calibration;
        state.catFeatures = null;  // Step 3 re-runs the probe batch
        state.axisDomain = null;
        state.datasetPoints = [];
        
        logToLedger(`[Step 2: SCM Topology Constructed]\n` +
            `• Endogenous Variables (|Z|): ${nodes.length}\n` +
            `• Observed Features (Z_X): ${featureCount}\n` +
            `• Observed Target (z_y): 1\n` +
            `• Dense Synaptic Weights Initialized via N(0, σ²)`);
        
        renderUnifiedCanvas();
        updateUIState();
    }

    function stepDropout() {
        if (!state.graph) return;

        let dropCount = 0;
        state.graph.edges.forEach(edge => {
            if (Math.random() < state.dropoutRate) {
                edge.dropped = true;
                dropCount++;
            }
        });

        state.step = 3;
        state.stepTitle = "Step 3: Edge Dropout — Prior Fixed, Class Partition Calibrated";

        // The DAG is now final: fix the class partition + categorical bins
        // from a hidden probe batch of this prior's own outputs.
        calibratePartition();
        populateAxisPickers();   // refresh X/Y covariate dropdowns (requirement 3)
        // Phase I is now fully determined; restart the RNG on a fixed, prior-derived
        // seed so data generation (the scatter) reproduces deterministically —
        // "the first N points drawn from this prior" — independent of how many
        // random draws Phase I happened to consume.
        seedRng((state.priorSeed ^ 0x9E3779B9) >>> 0);
        renderScatter();

        let activeEdges = state.graph.edges.length - dropCount;
        let actualRate = ((dropCount / state.graph.edges.length) * 100).toFixed(1);
        
        logToLedger(`[Step 3: Edge Dropout Applied]\n` +
            `• Dropped Causal Mechanisms: ${dropCount} (${actualRate}% removed)\n` +
            `• Surviving Active Edges: ${activeEdges}\n` +
            `• Topological Structure: Directed Acyclic Graph (DAG) established.`);
            
        renderUnifiedCanvas();
        updateUIState();
    }

    function stepSampleNoise() {
        if (!state.graph) return;
        
        state.graph.nodes.forEach(node => {
            node.noise = randn() * state.sigmaEps;   // ε_i ~ N(0, σ_ε²), σ_ε from Step 1
            node.value = 0.0;
        });

        state.step = 4;
        state.sampleCount++;     // each Phase II entry draws a fresh data sample from the fixed prior
        state.stepTitle = `Step 4: Sample Exogenous Noise (ε) for all Nodes  (Sample #${state.sampleCount})`;
        state.currentPropagationLayer = -1;
        state.continuousOutput = null;
        state.forwardComplete = false;
        state.classData = null;
        // NOTE: classSplit/axisDomain deliberately survive — the partition is part
        // of the prior and stays fixed across all samples drawn from it.
        
        logToLedger(`[Step 4: Exogenous Noise Injected]\n` +
            `• Structural Noise ε_i ~ N(0, σ_i^2) sampled for all nodes in Z.\n` +
            `• Ready to propagate causal generation layer-by-layer.`);
            
        renderUnifiedCanvas();
        updateUIState();
    }

    function stepFlow() {
        if (!state.graph) return;
        if (state.forwardComplete) return; // causal generation runs exactly once

        let nextLayer = state.currentPropagationLayer + 1;
        if (nextLayer >= state.graph.topology.length) {
            state.currentPropagationLayer = -2;
            let targetNode = state.graph.nodes.find(n => n.role === 'target');
            state.continuousOutput = targetNode.value;
            state.forwardComplete = true;
            // Axis was fixed at Step 3; widen minimally only if this z_y is an outlier.
            const d = state.axisDomain, s = d.max - d.min;
            if (state.continuousOutput < d.min) d.min = state.continuousOutput - 0.05 * s;
            if (state.continuousOutput > d.max) d.max = state.continuousOutput + 0.05 * s;

            updateUIState();
            renderUnifiedCanvas();
            return;
        }

        let targetNodes = state.graph.nodes.filter(n => n.layer === nextLayer);
        let trace = [];
        
        targetNodes.forEach(tNode => {
            let incomingEdges = state.graph.edges.filter(e => e.target.id === tNode.id && !e.dropped);
            let dotProduct = 0;
            let equationTerms = [];
            
            incomingEdges.forEach(edge => {
                let term = edge.source.value * edge.weight;
                dotProduct += term;
                let sourceName = edge.source.role === 'feature' ? `z_X${edge.source.featureIdx + 1}` : edge.source.id.split('_')[2];
                equationTerms.push(`(${edge.weight.toFixed(2)} * ${sourceName}[${edge.source.value.toFixed(2)}])`);
            });
            
            let linearEq = equationTerms.length > 0 ? equationTerms.join(' + ') : '0';
            let linearActivation = dotProduct + tNode.noise;
            tNode.value = applyActivation(linearActivation, state.activation);

            trace.push(`  - ${tNode.id} [${tNode.role}]:\n    z_i = ${state.activation}( ${linearEq} + ${tNode.noise.toFixed(2)}[ε] ) = ${tNode.value.toFixed(4)}`);
        });

        state.currentPropagationLayer = nextLayer;
        state.stepTitle = `Step 5: Causal Forward Propagation (Evaluating Layer ${nextLayer})`;
        if (nextLayer === state.graph.topology.length - 1) {
            state.step = 5;
            state.stepTitle = "Step 5: Causal Forward Propagation Complete (Dataset Sample Generated)";
        }
        
        logToLedger(`[Step 5: Generated Layer ${nextLayer}]\n` +
            `• General Mechanism: z_i = f(Σ(W_{ij} * z_j) + ε_i)\n\n` +
            `• Mathematical Evaluation Trace:\n${trace.join('\n\n')}`);
            
        renderUnifiedCanvas(true);
        updateUIState();
    }

    function stepTransform() {
        // Runs once: only after generation, and never after a label is assigned.
        if (!state.forwardComplete || state.classData || !state.classSplit) return;

        // The partition (count + cut points) was fixed at Step 1. Discretization is now
        // purely deterministic: z_y lands in the interval it falls into — same z_y, same class.
        let { numClasses, bounds } = state.classSplit;
        let assignedClass = 0;
        bounds.forEach(bound => { if (bound < state.continuousOutput) assignedClass++; });

        state.classData = { numClasses, bounds, assignedClass };
        state.step = 6;
        state.stepTitle = "Step 6: Discretize z_y to Class Label (+ Categorical Features)";

        // requirement 2: this stepped-through sample becomes a point in the scatter
        addDatasetSample(graphFeatureValues(), assignedClass);

        renderUnifiedCanvas();
        updateUIState();
    }

    // ---- one-click orchestrators -------------------------------------------
    // Phase I in a single click (Steps 1→2→3), then a whole data point in a
    // single click (Steps 4→5→…→6). Steps are the same functions the manual
    // buttons call; a short delay between them keeps the build/generation
    // legible. state.autoRunning locks every button while a sequence plays.
    function runPhase1() {
        if (state.autoRunning) return;
        state.autoRunning = true;
        stepSampleHyper();                 // Step 1
        updateUIState();                   // lock the controls for the cascade
        setTimeout(() => {
            stepBuildDense();              // Step 2
            setTimeout(() => {
                stepDropout();             // Step 3
                state.autoRunning = false;
                updateUIState();
            }, 380);
        }, 380);
    }

    function runSample() {
        if (state.autoRunning || state.step < 3 || !state.graph) return;
        state.autoRunning = true;
        stepSampleNoise();                 // Step 4 (new data sample)
        updateUIState();
        const flow = () => {
            if (!state.forwardComplete) {
                stepFlow();                // Step 5, one layer per tick
                setTimeout(flow, 300);
            } else {
                setTimeout(() => {
                    stepTransform();       // Step 6 (discretize on the fixed partition)
                    state.autoRunning = false;
                    updateUIState();
                }, 360);
            }
        };
        setTimeout(flow, 340);
    }

    // Wire the manual step buttons and the two one-click orchestrators.
    btnSampleHyper.addEventListener('click', stepSampleHyper);
    btnBuildDense.addEventListener('click', stepBuildDense);
    btnDropoutEdges.addEventListener('click', stepDropout);
    btnSampleNoise.addEventListener('click', stepSampleNoise);
    btnFlowData.addEventListener('click', stepFlow);
    btnTransformClass.addEventListener('click', stepTransform);
    btnRunPhase1.addEventListener('click', runPhase1);
    btnRunSample.addEventListener('click', runSample);

    function renderUnifiedCanvas(highlightActiveFlow = false) {
        mainSvg.innerHTML = '';

        const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
        defs.innerHTML = `
            <style>
                text { font-family: 'LM Roman 10', Georgia, serif; }
                .mono { font-family: monospace; font-weight: bold; }
            </style>
        `;
        mainSvg.appendChild(defs);

        const titleText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        titleText.setAttribute('x', 30);
        titleText.setAttribute('y', 28);
        titleText.setAttribute('font-size', '18px');
        titleText.setAttribute('font-weight', 'bold');
        titleText.setAttribute('fill', '#212529');
        titleText.textContent = state.stepTitle;
        mainSvg.appendChild(titleText);

        const subText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        subText.setAttribute('x', 30);
        subText.setAttribute('y', 47);
        subText.setAttribute('font-size', '13px');
        subText.setAttribute('fill', '#6c757d');
        subText.textContent = `${state.layers} Layers | Width: ${state.hiddenUnits} | f_i: ${state.activation} | Dropout: ${(state.dropoutRate*100).toFixed(0)}% | σ_w = ${fmt(state.sigmaW)} | σ_ε = ${fmt(state.sigmaEps)} | N_c = ${state.numClasses}${state.priorSeed !== null ? ` | seed = ${state.priorSeed}` : ''}`;
        mainSvg.appendChild(subText);

        // Data-sample counter (top-right): the Phase-I prior is fixed; each Phase II→III
        // pass draws another sample from it, so this ticks up as the loop is repeated.
        if (state.sampleCount > 0) {
            const sampleTxt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            sampleTxt.setAttribute('x', 970);
            sampleTxt.setAttribute('y', 28);
            sampleTxt.setAttribute('text-anchor', 'end');
            sampleTxt.setAttribute('font-size', '14px');
            sampleTxt.setAttribute('font-weight', 'bold');
            sampleTxt.setAttribute('fill', '#23373b');
            sampleTxt.textContent = `Data sample #${state.sampleCount}`;
            mainSvg.appendChild(sampleTxt);
        }

        if (state.graph) {
            state.graph.edges.forEach(edge => {
                // Geometry: start at the source boundary, end just outside the target
                // boundary. The arrowhead is an explicit polygon (kept from the
                // source file so the drawing is identical).
                const dx = edge.target.x - edge.source.x;
                const dy = edge.target.y - edge.source.y;
                const len = Math.hypot(dx, dy) || 1;
                const ux = dx / len, uy = dy / len;
                const px = -uy, py = ux; // unit perpendicular
                const sR = edge.source.role === 'target' ? 26 : 22;
                const tR = edge.target.role === 'target' ? 26 : 22;

                const aLen = 11, aHalf = 4.5;          // arrowhead length / half-width
                const startX = edge.source.x + ux * sR;
                const startY = edge.source.y + uy * sR;
                const tipX = edge.target.x - ux * (tR + 3);
                const tipY = edge.target.y - uy * (tR + 3);
                const baseX = tipX - ux * aLen;
                const baseY = tipY - uy * aLen;

                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                line.setAttribute('x1', startX);
                line.setAttribute('y1', startY);

                if (edge.dropped) {
                    line.setAttribute('x2', tipX);
                    line.setAttribute('y2', tipY);
                    line.setAttribute('stroke', '#e9ecef');
                    line.setAttribute('stroke-opacity', '0.4');
                    line.setAttribute('stroke-dasharray', '3,5');
                    line.setAttribute('stroke-width', '1.5px');
                    mainSvg.appendChild(line);
                    return; // dropped mechanism: no arrowhead
                }

                const isActive = highlightActiveFlow && (edge.target.layer === state.currentPropagationLayer);
                const lineColor = isActive ? '#28a745' : '#adb5bd';
                const headColor = isActive ? '#28a745' : '#6c757d';

                // stop the line at the base of the arrowhead so it doesn't poke past the tip
                line.setAttribute('x2', baseX);
                line.setAttribute('y2', baseY);
                line.setAttribute('stroke', lineColor);
                if (isActive) {
                    line.setAttribute('stroke-width', '3px');
                    line.setAttribute('stroke-dasharray', '6,6');
                } else {
                    line.setAttribute('stroke-opacity', '0.6');
                    line.setAttribute('stroke-width', Math.min(Math.abs(edge.weight) * 2.0 + 1.0, 3.5));
                }
                mainSvg.appendChild(line);

                const head = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
                head.setAttribute('points',
                    `${tipX},${tipY} ` +
                    `${baseX + px * aHalf},${baseY + py * aHalf} ` +
                    `${baseX - px * aHalf},${baseY - py * aHalf}`);
                head.setAttribute('fill', headColor);
                mainSvg.appendChild(head);
            });

            // Exogenous noise (ε_i) is drawn as its OWN node — a small dashed circle
            // sitting up-and-left of each endogenous variable, with a dashed arrow
            // pointing into it. It only appears once noise has been sampled (step 4/5)
            // and disappears once the target is discretized (Phase III).
            if (state.step >= 4 && !state.classData) {
                const nR = 14;            // noise-node radius
                const offX = -30, offY = -44;
                state.graph.nodes.forEach(node => {
                    const r = node.role === 'target' ? 26 : 22;
                    const nx = node.x + offX;
                    const ny = node.y + offY;

                    // dashed connector: noise node -> variable boundary
                    const dx = node.x - nx, dy = node.y - ny;
                    const len = Math.hypot(dx, dy) || 1;
                    const ux = dx / len, uy = dy / len;
                    const px = -uy, py = ux;
                    const aLen = 9, aHalf = 4;
                    const startX = nx + ux * nR;
                    const startY = ny + uy * nR;
                    const tipX = node.x - ux * (r + 2);
                    const tipY = node.y - uy * (r + 2);
                    const baseX = tipX - ux * aLen;
                    const baseY = tipY - uy * aLen;

                    const nLine = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                    nLine.setAttribute('x1', startX);
                    nLine.setAttribute('y1', startY);
                    nLine.setAttribute('x2', baseX);
                    nLine.setAttribute('y2', baseY);
                    nLine.setAttribute('stroke', '#fd7e14');
                    nLine.setAttribute('stroke-width', '1.5px');
                    nLine.setAttribute('stroke-dasharray', '4,3');
                    mainSvg.appendChild(nLine);

                    const nHead = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
                    nHead.setAttribute('points',
                        `${tipX},${tipY} ` +
                        `${baseX + px * aHalf},${baseY + py * aHalf} ` +
                        `${baseX - px * aHalf},${baseY - py * aHalf}`);
                    nHead.setAttribute('fill', '#fd7e14');
                    mainSvg.appendChild(nHead);

                    // dashed noise node
                    const nCircle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                    nCircle.setAttribute('cx', nx);
                    nCircle.setAttribute('cy', ny);
                    nCircle.setAttribute('r', nR);
                    nCircle.setAttribute('fill', '#fff3e6');
                    nCircle.setAttribute('stroke', '#fd7e14');
                    nCircle.setAttribute('stroke-width', '1.5px');
                    nCircle.setAttribute('stroke-dasharray', '3,2.5');
                    mainSvg.appendChild(nCircle);

                    const nVal = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                    nVal.setAttribute('x', nx);
                    nVal.setAttribute('y', ny + 3);
                    nVal.setAttribute('text-anchor', 'middle');
                    nVal.setAttribute('class', 'mono');
                    nVal.setAttribute('font-size', '9px');
                    nVal.setAttribute('fill', '#c25e00');
                    nVal.textContent = fmt(node.noise);
                    mainSvg.appendChild(nVal);

                    const nLbl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                    nLbl.setAttribute('x', nx);
                    nLbl.setAttribute('y', ny - nR - 3);
                    nLbl.setAttribute('text-anchor', 'middle');
                    nLbl.setAttribute('font-size', '11px');
                    nLbl.setAttribute('font-style', 'italic');
                    nLbl.setAttribute('font-weight', '600');
                    nLbl.setAttribute('fill', '#fd7e14');
                    nLbl.textContent = 'ε';
                    mainSvg.appendChild(nLbl);
                });
            }

            state.graph.nodes.forEach(node => {
                const group = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                
                const r = node.role === 'target' ? 26 : 22;
                const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                circle.setAttribute('cx', node.x);
                circle.setAttribute('cy', node.y);
                circle.setAttribute('r', r);
                
                let baseColor = '#f8f9fa';
                let strokeColor = '#ced4da';

                if (node.role === 'feature') {
                    baseColor = '#d1ecf1';
                    strokeColor = '#17a2b8';
                } else if (node.role === 'target') {
                    baseColor = state.classData ? '#28a745' : '#fff3cd';
                    strokeColor = state.classData ? '#1e7e34' : '#ffc107';
                }

                if (highlightActiveFlow && node.layer === state.currentPropagationLayer) {
                    strokeColor = '#28a745';
                    circle.setAttribute('stroke-width', '3.5px');
                } else if (node.role === 'target' || node.role === 'feature') {
                    circle.setAttribute('stroke-width', '3px');
                } else {
                    circle.setAttribute('stroke-width', '2px');
                }

                circle.setAttribute('fill', baseColor);
                circle.setAttribute('stroke', strokeColor);
                group.appendChild(circle);

                const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                text.setAttribute('x', node.x);
                text.setAttribute('y', node.y + 4);
                text.setAttribute('text-anchor', 'middle');
                
                const catInfo = node.role === 'feature' && state.catFeatures
                    ? state.catFeatures[node.featureIdx] : null;
                if (node.role === 'target' && state.classData) {
                    text.setAttribute('font-size', '14px');
                    text.setAttribute('font-weight', 'bold');
                    text.setAttribute('fill', '#ffffff');
                    text.textContent = `C:${state.classData.assignedClass}`;
                } else if (catInfo && state.classData && state.step >= 4) {
                    // categorical feature, after Step 6: show the binned category
                    const k = catInfo.bounds.reduce((a, b) => a + (b < node.value ? 1 : 0), 0);
                    text.setAttribute('class', 'mono');
                    text.setAttribute('font-size', '13px');
                    text.setAttribute('fill', '#0e7b70');
                    text.textContent = `c${k}`;
                } else {
                    text.setAttribute('class', 'mono');
                    text.setAttribute('font-size', '12px');
                    text.setAttribute('fill', '#212529');
                    if (state.step >= 4) {
                        text.textContent = fmt(node.value);
                    }
                }
                group.appendChild(text);
                
                const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                label.setAttribute('x', node.x);
                label.setAttribute('y', node.y - (r + 7));
                label.setAttribute('font-size', '11px');
                label.setAttribute('font-weight', '600');
                label.setAttribute('text-anchor', 'middle');
                
                if (node.role === 'feature') {
                    label.setAttribute('fill', '#17a2b8');
                    const isCat = state.catFeatures && state.catFeatures[node.featureIdx];
                    label.textContent = `z_X${node.featureIdx + 1}${isCat ? ' (cat)' : ''}`;
                    if (isCat) label.setAttribute('fill', '#0e7b70');
                } else if (node.role === 'target') {
                    label.setAttribute('fill', '#d39e00');
                    label.textContent = state.classData ? `z_y (Class ${state.classData.assignedClass})` : `z_y`;
                } else {
                    label.setAttribute('fill', '#adb5bd');
                    label.textContent = node.id.split('_')[2];
                }
                
                group.appendChild(label);

                mainSvg.appendChild(group);
            });
        } else {
            const ph = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            ph.setAttribute('x', 500);
            ph.setAttribute('y', 230);
            ph.setAttribute('text-anchor', 'middle');
            ph.setAttribute('fill', '#adb5bd');
            ph.setAttribute('font-size', '15px');
            ph.textContent = "";
            mainSvg.appendChild(ph);
        }

        const padX = 60;
        const drawWidth = 1000 - (padX * 2);
        const lineY = 410;

        const axis = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        axis.setAttribute('x1', padX);
        axis.setAttribute('y1', lineY);
        axis.setAttribute('x2', 1000 - padX);
        axis.setAttribute('y2', lineY);
        axis.setAttribute('stroke', '#343a40');
        axis.setAttribute('stroke-width', '2px');
        mainSvg.appendChild(axis);

        // The class partition appears once calibrated (Step 3, end of Phase I) and
        // then never moves: every sample drawn from this prior lands on the same axis.
        if (state.axisDomain !== null && state.classSplit !== null) {
            let minVal = state.axisDomain.min;
            let maxVal = state.axisDomain.max;
            let range = maxVal - minVal;
            const mapX = (val) => padX + ((val - minVal) / range) * drawWidth;

            {
                let { numClasses, bounds } = state.classSplit;
                // The winning class is only marked once discretization runs (Step 6).
                let assignedClass = state.classData ? state.classData.assignedClass : -1;
                let extBounds = [minVal, ...bounds, maxVal];

                for(let c = 0; c < numClasses; c++) {
                    let x1 = mapX(extBounds[c]);
                    let x2 = mapX(extBounds[c+1]);
                    let isTarget = (c === assignedClass);

                    const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                    rect.setAttribute('x', x1);
                    rect.setAttribute('y', lineY - 32);
                    rect.setAttribute('width', Math.max(0, x2 - x1));
                    rect.setAttribute('height', 64);
                    rect.setAttribute('fill', isTarget ? '#d4edda' : (c % 2 === 0 ? '#f8f9fa' : '#e9ecef'));
                    rect.setAttribute('stroke', isTarget ? '#28a745' : '#dee2e6');
                    rect.setAttribute('stroke-width', isTarget ? '2px' : '1px');
                    mainSvg.insertBefore(rect, axis);

                    const classLbl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                    classLbl.setAttribute('x', x1 + (x2 - x1) / 2);
                    classLbl.setAttribute('y', lineY - 42);
                    classLbl.setAttribute('text-anchor', 'middle');
                    classLbl.setAttribute('font-size', '12px');
                    classLbl.setAttribute('font-weight', isTarget ? 'bold' : 'normal');
                    classLbl.setAttribute('fill', isTarget ? '#155724' : '#495057');
                    classLbl.textContent = `Class ${c}`;
                    mainSvg.appendChild(classLbl);
                }

                bounds.forEach((b, idx) => {
                    let bx = mapX(b);
                    const bLine = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                    bLine.setAttribute('x1', bx);
                    bLine.setAttribute('y1', lineY - 32);
                    bLine.setAttribute('x2', bx);
                    bLine.setAttribute('y2', lineY + 32);
                    bLine.setAttribute('stroke', '#dc3545');
                    bLine.setAttribute('stroke-width', '2px');
                    bLine.setAttribute('stroke-dasharray', '3,3');
                    mainSvg.appendChild(bLine);

                    const bTxt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                    bTxt.setAttribute('x', bx);
                    bTxt.setAttribute('y', lineY + 47);
                    bTxt.setAttribute('text-anchor', 'middle');
                    bTxt.setAttribute('font-size', '11px');
                    bTxt.setAttribute('class', 'mono');
                    bTxt.setAttribute('fill', '#dc3545');
                    bTxt.textContent = `B${idx}: ${fmtAxis(b)}`;
                    mainSvg.appendChild(bTxt);
                });
            }

            // Plot the continuous target z_y once Phase II has generated it (kept at its
            // exact absolute coordinate — the partition around it never moves).
            if (state.continuousOutput !== null) {
                let yx = mapX(state.continuousOutput);
                const yLine = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                yLine.setAttribute('x1', yx);
                yLine.setAttribute('y1', lineY - 20);
                yLine.setAttribute('x2', yx);
                yLine.setAttribute('y2', lineY + 20);
                yLine.setAttribute('stroke', '#007bff');
                yLine.setAttribute('stroke-width', '3px');
                mainSvg.appendChild(yLine);

                const yPoint = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                yPoint.setAttribute('cx', yx);
                yPoint.setAttribute('cy', lineY);
                yPoint.setAttribute('r', 6);
                yPoint.setAttribute('fill', '#007bff');
                yPoint.setAttribute('stroke', '#ffffff');
                yPoint.setAttribute('stroke-width', '2px');
                mainSvg.appendChild(yPoint);

                const yTxt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                yTxt.setAttribute('x', yx);
                yTxt.setAttribute('y', lineY - 26);
                yTxt.setAttribute('text-anchor', 'middle');
                yTxt.setAttribute('font-size', '12px');
                yTxt.setAttribute('class', 'mono');
                yTxt.setAttribute('fill', '#007bff');
                yTxt.textContent = `z_y: ${fmtAxis(state.continuousOutput)}`;
                mainSvg.appendChild(yTxt);
            }
        } else {
            const ph = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            ph.setAttribute('x', 500);
            ph.setAttribute('y', lineY - 15);
            ph.setAttribute('text-anchor', 'middle');
            ph.setAttribute('fill', '#adb5bd');
            ph.setAttribute('font-size', '13px');
            ph.textContent = pendingSeed !== null
                ? 'Primed from a saved example — press ▶ Sample Prior (Phase I) to reproduce it.'
                : 'Run Phase I (Steps 1–3) to build the prior and fix the class partition...';
            mainSvg.appendChild(ph);
        }
    }

    // ============================================================
    //  Right-panel 2D scatter of the generated dataset.
    //  Requirement 2: one point per drawn sample; axes are the first
    //  two covariate marginals (z_X1, z_X2), colour is the class.
    //  Requirement 3: "Generate k points" adds k silent draws at once.
    // ============================================================
    const CLASS_COLORS = ['#4c78a8', '#f58518', '#54a24b', '#e45756', '#b279a2',
                          '#eeca3b', '#72b7b2', '#ff9da6', '#9d755d', '#bab0ac'];
    const FEAT_PREFIX = 'z_X';                // covariate name prefix

    function isFeatureNode(n) { return n.role === 'feature'; }
    function featureLabel(i) { return FEAT_PREFIX + (i + 1); }
    function isCatFeature(i) { return !!(state.catFeatures && state.catFeatures[i]); }

    function classOf(yv) {
        let c = 0;
        if (state.classSplit) state.classSplit.bounds.forEach(b => { if (b < yv) c++; });
        return c;
    }
    // full covariate vector of the sample currently on the graph (featureIdx order)
    function graphFeatureValues() {
        return state.graph.nodes.filter(isFeatureNode)
            .sort((a, b) => a.featureIdx - b.featureIdx).map(n => n.value);
    }
    function addDatasetSample(feats, cls) {
        state.datasetPoints.push({ feats, cls });
        renderScatter();
    }
    // one silent draw from the fixed prior (reuses the probe forward pass)
    function drawSilentSample() {
        const { yhat, feats } = probeForward();
        return { feats, cls: classOf(yhat) };
    }
    function runBulk() {
        if (state.autoRunning || state.step < 3 || !state.graph || !state.classSplit) return;
        const k = Math.max(1, Math.min(2000, parseInt(bulkK.value, 10) || 0));
        for (let i = 0; i < k; i++) state.datasetPoints.push(drawSilentSample());
        state.sampleCount += k;
        renderScatter();
        renderUnifiedCanvas();   // refresh the "Data sample #k" counter
    }
    btnBulk.addEventListener('click', runBulk);

    // value plotted for covariate f: its category index if categorical, else raw
    function plottedValue(f, raw) {
        if (!isCatFeature(f)) return raw;
        let k = 0; state.catFeatures[f].bounds.forEach(b => { if (b < raw) k++; });
        return k;
    }
    function featCount() {
        return state.graph ? state.graph.nodes.filter(isFeatureNode).length : 0;
    }
    // (re)build the X/Y covariate dropdowns from the current prior (requirement 3)
    function populateAxisPickers() {
        const n = featCount();
        [axisX, axisY].forEach((sel, si) => {
            const prev = parseInt(sel.value, 10);
            sel.innerHTML = '';
            for (let i = 0; i < n; i++) {
                const opt = document.createElement('option');
                opt.value = i;
                opt.textContent = featureLabel(i) + (isCatFeature(i) ? ' (cat)' : '');
                sel.appendChild(opt);
            }
            const def = si === 0 ? 0 : Math.min(1, n - 1);
            sel.value = (!isNaN(prev) && prev >= 0 && prev < n) ? prev : def;
        });
    }
    axisX.addEventListener('change', renderScatter);
    axisY.addEventListener('change', renderScatter);

    function svgEl(tag, attrs, text) {
        const e = document.createElementNS('http://www.w3.org/2000/svg', tag);
        for (const k in attrs) e.setAttribute(k, attrs[k]);
        if (text !== undefined) e.textContent = text;
        return e;
    }
    function niceNum(v) {
        const a = Math.abs(v);
        if (a >= 1000) return v.toExponential(1);
        if (a >= 100) return v.toFixed(0);
        if (a >= 1) return v.toFixed(1);
        return v.toFixed(2);
    }
    // axis domain + tick values for covariate `idx` given plotted values `vals`
    function axisSpec(idx, vals) {
        if (isCatFeature(idx)) {
            const nCat = state.catFeatures[idx].nCat, ticks = [];
            for (let c = 0; c < nCat; c++) ticks.push(c);
            return { lo: -0.5, hi: nCat - 0.5, ticks, cat: true };
        }
        let lo = -3, hi = 3;
        if (vals.length) { lo = Math.min(...vals); hi = Math.max(...vals); }
        const s = (hi - lo) || 1; lo -= 0.08 * s; hi += 0.08 * s;
        const ticks = [];
        for (let i = 0; i <= 4; i++) ticks.push(lo + (hi - lo) * i / 4);
        return { lo, hi, ticks, cat: false };
    }
    function renderScatter() {
        dsSvg.innerHTML = '';
        const W = 460, H = 470, padL = 54, padR = 16, padT = 46, padB = 48;
        const x0 = padL, x1 = W - padR, yBot = H - padB, yTop = padT;

        dsSvg.appendChild(svgEl('text', { x: 20, y: 26, 'font-size': 16,
            'font-weight': 'bold', fill: '#212529' }, 'Sampled dataset'));

        const nc = state.classSplit ? state.classSplit.numClasses : (state.numClasses || 0);
        for (let c = 0; c < nc; c++) {
            const lx = W - padR - (nc - c) * 44;
            dsSvg.appendChild(svgEl('circle', { cx: lx, cy: 21, r: 5,
                fill: CLASS_COLORS[c % CLASS_COLORS.length] }));
            dsSvg.appendChild(svgEl('text', { x: lx + 8, y: 25, 'font-size': 11,
                fill: '#495057' }, 'C' + c));
        }

        const xIdx = parseInt(axisX.value, 10) || 0;
        const yIdx = parseInt(axisY.value, 10) || 0;
        const P = state.datasetPoints.map(p => ({
            x: plottedValue(xIdx, p.feats[xIdx]),
            y: plottedValue(yIdx, p.feats[yIdx]),
            cls: p.cls
        }));
        const xs = axisSpec(xIdx, P.map(p => p.x));
        const ys = axisSpec(yIdx, P.map(p => p.y));
        const mapX = v => x0 + (v - xs.lo) / (xs.hi - xs.lo) * (x1 - x0);
        const mapY = v => yBot - (v - ys.lo) / (ys.hi - ys.lo) * (yBot - yTop);

        dsSvg.appendChild(svgEl('line', { x1: x0, y1: yBot, x2: x1, y2: yBot,
            stroke: '#343a40', 'stroke-width': 1.5 }));
        dsSvg.appendChild(svgEl('line', { x1: x0, y1: yBot, x2: x0, y2: yTop,
            stroke: '#343a40', 'stroke-width': 1.5 }));

        xs.ticks.forEach(tx => {
            const px = mapX(tx);
            dsSvg.appendChild(svgEl('line', { x1: px, y1: yBot, x2: px, y2: yBot + 4,
                stroke: '#adb5bd', 'stroke-width': 1 }));
            dsSvg.appendChild(svgEl('text', { x: px, y: yBot + 16, 'font-size': 10,
                fill: '#6c757d', 'text-anchor': 'middle' },
                xs.cat ? String(tx) : niceNum(tx)));
        });
        ys.ticks.forEach(ty => {
            const py = mapY(ty);
            dsSvg.appendChild(svgEl('line', { x1: x0 - 4, y1: py, x2: x0, y2: py,
                stroke: '#adb5bd', 'stroke-width': 1 }));
            dsSvg.appendChild(svgEl('text', { x: x0 - 7, y: py + 3, 'font-size': 10,
                fill: '#6c757d', 'text-anchor': 'end' },
                ys.cat ? String(ty) : niceNum(ty)));
        });

        dsSvg.appendChild(svgEl('text', { x: (x0 + x1) / 2, y: H - 10, 'font-size': 12,
            fill: '#495057', 'text-anchor': 'middle', 'font-style': 'italic' },
            featureLabel(xIdx) + (xs.cat ? ' (categorical)' : '')));
        dsSvg.appendChild(svgEl('text', { x: 16, y: (yTop + yBot) / 2, 'font-size': 12,
            fill: '#495057', 'text-anchor': 'middle', 'font-style': 'italic',
            transform: `rotate(-90 16 ${(yTop + yBot) / 2})` },
            featureLabel(yIdx) + (ys.cat ? ' (categorical)' : '')));

        P.forEach(p => {
            dsSvg.appendChild(svgEl('circle', { cx: mapX(p.x), cy: mapY(p.y), r: 3.5,
                fill: CLASS_COLORS[p.cls % CLASS_COLORS.length],
                'fill-opacity': 0.82, stroke: '#ffffff', 'stroke-width': 0.6 }));
        });

        if (P.length === 0) {
            dsSvg.appendChild(svgEl('text', { x: (x0 + x1) / 2, y: (yTop + yBot) / 2,
                'font-size': 12, fill: '#adb5bd', 'text-anchor': 'middle' },
                'Draw data points to populate this plot'));
        }
    }

    // ============================================================
    //  Saved examples: persist good-looking priors and replay them.
    //  Each entry stores the RNG seed (which reproduces the whole prior) plus
    //  the scatter point count. Persisted in localStorage so they survive a
    //  reload. Selecting an example does NOT draw it — it QUEUES the seed
    //  (pendingSeed) and clears the canvas; the presenter then runs Phase I
    //  live and it reproduces the curated prior. On load the first entry is
    //  queued this way, so the slide opens empty but primed.
    // ============================================================
    const LS_KEY = 'scm-saved-priors-v1';

    function loadSavedList() {
        try { return JSON.parse(localStorage.getItem(LS_KEY)) || []; }
        catch (e) { return []; }
    }
    function persistSavedList(arr) {
        try { localStorage.setItem(LS_KEY, JSON.stringify(arr)); }
        catch (e) { /* storage may be unavailable (e.g. file:// + strict browser) */ }
    }
    function priorSummary() {
        return `${state.layers}L·w${state.hiddenUnits}·${state.activation}` +
               `·d${Math.round(state.dropoutRate * 100)}·Nc${state.numClasses}`;
    }
    function refreshSavedSelect(selectIdx) {
        const arr = loadSavedList();
        savedSelect.innerHTML = '';
        if (!arr.length) {
            const o = document.createElement('option');
            o.value = ''; o.textContent = '(none saved)';
            savedSelect.appendChild(o);
        } else {
            arr.forEach((e, i) => {
                const o = document.createElement('option');
                o.value = i;
                o.textContent = e.label || `#${i + 1} · ${e.summary || ('seed ' + e.seed)}`;
                savedSelect.appendChild(o);
            });
        }
        if (selectIdx != null && selectIdx >= 0 && selectIdx < arr.length) {
            savedSelect.value = String(selectIdx);
        }
        btnLoadSaved.disabled = !arr.length;
        btnDeleteSaved.disabled = !arr.length;
        savedSelect.disabled = !arr.length;
    }

    // Return the demo to its empty idle state (nothing built, no data plotted).
    function resetToIdle() {
        state.step = 0;
        state.stepTitle = 'System Idle';
        state.layers = 0; state.hiddenUnits = 0;
        state.activation = 'Identity'; state.dropoutRate = 0.0;
        state.numClasses = 0;
        state.graph = null;
        state.classData = null; state.classSplit = null;
        state.catFeatures = null; state.axisDomain = null;
        state.continuousOutput = null; state.forwardComplete = false;
        state.currentPropagationLayer = -1;
        state.sampleCount = 0;
        state.priorSeed = null;          // not realized yet — pendingSeed holds the queue
        state.datasetPoints = [];
        renderUnifiedCanvas();
        renderScatter();
        updateUIState();
    }

    // Select a saved example WITHOUT drawing it: queue its seed and clear the
    // canvas. The presenter then walks through Phase I → III live and the run
    // deterministically reproduces this prior (hyperparameters + network + scatter).
    function primePrior(entry) {
        pendingSeed = entry.seed >>> 0;
        resetToIdle();
    }

    function saveCurrentPrior() {
        if (state.priorSeed === null || !state.graph) return;
        const arr = loadSavedList();
        arr.push({
            seed: state.priorSeed >>> 0,
            n: state.datasetPoints.length,
            summary: priorSummary(),
            ts: Date.now()
        });
        persistSavedList(arr);
        refreshSavedSelect(arr.length - 1);
    }
    function loadSelectedPrior() {
        const arr = loadSavedList();
        const i = parseInt(savedSelect.value, 10);
        if (isNaN(i) || i < 0 || i >= arr.length) return;
        primePrior(arr[i]);
    }
    function deleteSelectedPrior() {
        const arr = loadSavedList();
        const i = parseInt(savedSelect.value, 10);
        if (isNaN(i) || i < 0 || i >= arr.length) return;
        arr.splice(i, 1);
        persistSavedList(arr);
        const next = Math.min(i, arr.length - 1);
        refreshSavedSelect(next);
        if (arr.length) primePrior(arr[next]); else { pendingSeed = null; resetToIdle(); }
    }

    btnSavePrior.addEventListener('click', saveCurrentPrior);
    btnLoadSaved.addEventListener('click', loadSelectedPrior);
    btnDeleteSaved.addEventListener('click', deleteSelectedPrior);
    // Picking from the dropdown queues that example (does not draw it) — the next
    // "Sample Prior (Phase I)" run reproduces it. Handy for cueing an example
    // just before walking the audience through the pipeline.
    savedSelect.addEventListener('change', loadSelectedPrior);

    updateUIState();
    renderScatter();
    refreshSavedSelect();
    // On reload, QUEUE the first curated example but keep the canvas empty; the
    // presenter presses Sample Prior to reproduce it live.
    {
        const saved = loadSavedList();
        if (saved.length) { savedSelect.value = '0'; primePrior(saved[0]); }
    }
</script>
</body>
</html>
