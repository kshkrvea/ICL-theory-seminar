<!DOCTYPE html>
<!-- ===================================================================
  interactive/locality-bias.html — inline visualization for the "Bias
  and the Need for Locality" slide
  (sections/statistical_foundations.html #sf-bias; embedded via
  .iframe-fill.below-text).

  TWO window smoothers (section 6.1), ONE model at a time on TWO datasets,
  plus a variance-vs-n panel on the right (styled after
  interactive/diminishing-sensitivity.html).

  LEFT PANEL. A window smoother is fed two datasets and both prediction
  curves are drawn:
    - TEAL   q_theta(. | x, D_n)   — the original labels.
    - ORANGE q_theta(. | x, D~_n)  — the SAME model, same features, but
                                     every label with |X_i - x| > eps_n
                                     resampled from an adversarial constant
                                     phi~(1|x) = 0.9.
  The gap between the two traces IS the Definition's quantity
  |q(y|x, D_n) - q(y|x, D~_n)|; locality asks it to vanish.

  MODEL TOGGLE (3 models — two analytic smoothers plus the real checkpoint).
  Which of them an embed offers is set by the `models=` URL parameter:
    - Window smoother   uniform average over a FIXED window |X_i-x|<THETA_WIN.
                        At the STARTING n the window sits INSIDE the eps_n
                        frame, so it looks local. But eps_n -> 0 while the
                        window stays put, so past a crossover n the window
                        POKES OUT of the shrinking frame and starts averaging
                        scrambled far labels: the gap OPENS. Biased & NON-LOCAL.
    - Localised window  uniform average over a SHRINKING window
                        a_n THETA ~ n^{-1/5} (the a_n = n^{-1/(4+d)} rate,
                        d = 1). It stays inside eps_n for all n, so the gap
                        stays closed. LOCAL.
    - TabPFN v1         the ACTUAL pretrained checkpoint (tabpfn==0.1.11),
                        default settings, precomputed offline by
                        src/tabpfn_v1/generate_locality_predictions.py on the
                        SAME pool this page draws, and read from
                        data/locality_tabpfn.js. The n-slider snaps to the
                        context sizes that were run (20 .. 3162). Measured on the
                        [0, 1.8] support: the mean |D_n - D~_n| gap over interior
                        queries falls from 0.13 (n = 20) only to a PLATEAU of
                        ~0.06 and stays there up to n = 3162, while Var falls
                        3.6e-2 -> 6.4e-4 (slope n^-0.85). That is Thm 6.2 + 6.3 in
                        one picture: the variance vanishes, yet the predictor is
                        NOT local, so the gap does not follow it to zero.
  For the window smoothers the blue "averaging window" bracket vs the orange
  eps_n band shows the mechanism directly: bracket inside band == local; bracket
  poking out == averaging scrambled labels. For TabPFN the bracket is REPLACED by
  the measured attention window, drawn as two nested bracket lines (SOLID = 90%
  of the attention mass, DASHED = 50%) — same comparison, but read off the model.

  Rates (the ONLY structural requirements): eps_n -> 0 but SLOWER than the
  localised window, i.e. eps_n ~ n^{-1/9} while a_n ~ n^{-1/5}, so the
  localised window is o(eps_n). The FIXED window is constant, so eps_n
  inevitably shrinks below it — that crossover is the whole point.

  RIGHT PANEL — Var[q_theta(x)] vs n (linear "n scale" / log-log "log scale"
  toggle, dashed L n^{-alpha} rate guide, exactly the diminishing-sensitivity
  layout). Variance of a uniform-window average of Bernoulli labels is
  ~ mean_x p0(1-p0) / n_eff with n_eff ~ n * (window half-width):
      Window smoother   n_eff ~ n           => Var ~ 1/n        (alpha = 1)
      Localised window  n_eff ~ n^{4/5}      => Var ~ n^{-4/5}   (alpha = 4/5)
  So the FIXED window has the LOWER variance and the STEEPER decay — yet it
  is the biased, non-local one. That is the lesson this panel makes concrete:
  vanishing variance does NOT imply an unbiased/local predictor. Variance is
  computed from the ORIGINAL labels (a property of the estimator, not of the
  scramble), so it is the same story on D_n and D~_n.

  TRACES ARE STATIC in x*. Each trace point is the prediction AT that query
  point with the scramble cutoff measured from THAT point, so the curves are
  functions of x alone; only the x* marker, the eps_n band, the window bracket
  and the near/far sample shading follow the x* slider.

  Constants (N_REF, EPS0, THETA_WIN, WLOC0 and the two exponents) are tunable;
  the structural requirements are 1/5 > 1/9 (localised window o(eps_n)) and
  THETA_WIN < eps_n(start) < ... eventually THETA_WIN > eps_n (the crossover).

  Style/layout conventions follow interactive/diminishing-sensitivity.html.
=================================================================== -->

<!-- real pretrained TabPFN v1 predictions for this demo (generated offline by
     src/tabpfn_v1/generate_locality_predictions.py) -->
<script src="data/locality_tabpfn.js"></script>
<script>
    /* ---- data support ----
       X ~ Uniform[X_MIN, X_MAX]. The support is 1.8 periods of p0 (period 1)
       wide, so the target's periodicity is visible in the picture instead of
       looking like a one-off bump. Everything else (eps_n, the window widths)
       is measured in ABSOLUTE x units and so is unaffected; only the sample
       DENSITY drops by the factor 1.8 at a given n. */
    const X_MIN = 0, X_MAX = 1.8, X_SPAN = X_MAX - X_MIN;

    /* ---- asymptotic scales (see header comment) ---- */
    const N_MIN = 20, N_MAX = 10000;
    const N_REF = 40;
    const P_TILDE = 0.9;                        /* adversarial constant phi~(1|x) */
    const EPS0 = 0.20, EPS_MIN = 0.02, EPS_MAX = 0.40;
    /* the two window smoothers of section 6.1. THETA_WIN is FIXED: at the start
       it is inside the eps_n frame (EPS0 = 0.20 > 0.15), but eps_n ~ n^{-1/9}
       shrinks below it near n ~ 500, after which the window pokes out and eats
       scrambled labels. WLOC0 decays as n^{-1/5}, staying inside eps_n. */
    const THETA_WIN = 0.15;
    const WLOC0 = 0.13;
    const wLocN = n => WLOC0 * Math.pow(N_REF / n, 1 / 5);
    const TRACE_PTS = 200;
    const DRAW_CAP = 420;

    function mulberry32(a) {
        return function () {
            a |= 0; a = (a + 0x6D2B79F5) | 0;
            let t = Math.imul(a ^ (a >>> 15), 1 | a);
            t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
            return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
        };
    }
    const random = mulberry32(20240733);
    const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
    const p0 = x => 0.5 + 0.4 * Math.sin(2 * Math.PI * x);

    /* eps_n: the far/near cutoff for the scramble (defines D~_n, not the model).
       Only has to go to zero, so it may decay slowly; n^{-1/9} is slow enough to
       stay above the localised window (n^{-1/5}) yet still fall below the FIXED
       window eventually. */
    const epsN = n => clamp(EPS0 * Math.pow(N_REF / n, 1 / 9), EPS_MIN, EPS_MAX);

    const nOfSlider = t => Math.round(N_MIN * Math.pow(N_MAX / N_MIN, t / 1000));

    /* fixed pool; the n-slider uses the first n. Original labels ~ p0; far
       labels resampled from the adversarial CONSTANT phi~ = 0.9. */
    const poolX = new Float64Array(N_MAX);
    const poolY = new Float64Array(N_MAX);
    const poolAlt = new Float64Array(N_MAX);
    const poolJit = new Float64Array(N_MAX);
    for (let i = 0; i < N_MAX; i++) {
        const x = X_MIN + random() * X_SPAN;
        poolX[i] = x;
        poolY[i] = random() < p0(x) ? 1 : 0;
        poolAlt[i] = random() < P_TILDE ? 1 : 0;
        poolJit[i] = (random() - 0.5) * 0.07;
    }

    let nSamples = 40;
    /* 'window' | 'locwin' | 'tabpfn' — the MODEL TOGGLE.
       The first three are computed analytically below; 'tabpfn' is the REAL
       pretrained TabPFN v1, precomputed offline (window.LOCALITY_TABPFN). */
    let model = 'window';
    const MODELS = ['window', 'locwin', 'tabpfn'];
    /* An embed picks WHICH models it offers and which is selected, via the hash
       or the query string, e.g.
         locality-bias.html#models=window,locwin           (the bias slide)
         locality-bias.html#models=window,locwin,tabpfn&model=tabpfn
       Buttons outside the allowed set are removed. Defaults to all of them. */
    let allowedModels = MODELS.slice();
    {
        const hp = new URLSearchParams(location.hash.replace(/^#/, ''));
        const qp = new URLSearchParams(location.search);
        const par = k => hp.get(k) || qp.get(k);
        const list = (par('models') || '').split(',').map(s => s.trim()).filter(s => MODELS.includes(s));
        if (list.length) allowedModels = list;
        const m = par('model');
        model = allowedModels.includes(m) ? m : allowedModels[0];
    }

    /* ---- TabPFN v1 lookup ------------------------------------------------
       The checkpoint was run once per n in TPF.nGrid on the SAME pool this page
       draws, giving P(y=1) on a uniform grid of TPF.queryPts query points for
       both data sets. Nothing is recomputed here: the n-slider snaps to the
       nearest precomputed context size and the traces are read off. */
    const TPF = window.LOCALITY_TABPFN;
    const tpfSnapN = n => TPF.nGrid.reduce((best, c) =>
        Math.abs(Math.log(c) - Math.log(n)) < Math.abs(Math.log(best) - Math.log(n)) ? c : best,
        TPF.nGrid[0]);
    function tpfAt(arr, q) {              /* linear interp over the support */
        const m = arr.length - 1;
        const t = clamp((q - X_MIN) / X_SPAN, 0, 1) * m;
        const i = Math.min(m - 1, Math.floor(t));
        return arr[i] + (arr[i + 1] - arr[i]) * (t - i);
    }
    /* the window TabPFN actually ATTENDS to: the smallest symmetric interval
       around x* holding 50% / 90% of the query->context attention mass (averaged
       over the 3 ensemble members and the 4 heads). Measured per (n, x*) on the
       same grid as the x-slider, so this is a lookup, not an estimate.
       `attnLayer` selects which map: 0 = mean over all layers, k >= 1 = encoder
       layer k-1 on its own. The layers disagree sharply — layer 0 anchors on a
       single FAR point (h50 ~ 0.71) while layers 1.. are local (h50 ~ 0.11), so
       the mean's outer band is noticeably inflated by layer 0. Only the drawn
       WINDOW changes with this; the predictions and the variance panel are the
       whole model either way. */
    let attnLayer = 0;
    function tpfWin(n, xq) {
        const w = TPF.win;
        const i = clamp(Math.round((xq - w.xMin) / w.xStep), 0, w.xCount - 1);
        const k = clamp(attnLayer, 0, w.nLayers);
        return { h50: w.h50[n][k][i], h90: w.h90[n][k][i] };
    }

    /* first n samples sorted by x, so a prediction can binary-search its window
       instead of sweeping all N_MAX. Rebuilt only when n changes. */
    const sortX = new Float64Array(N_MAX);
    const sortY = new Float64Array(N_MAX);
    const sortAlt = new Float64Array(N_MAX);
    let sortedN = -1;

    function sortPrefix(n) {
        if (n === sortedN) return;
        sortedN = n;
        const idx = Array.from({ length: n }, (_, i) => i)
            .sort((a, b) => poolX[a] - poolX[b]);
        for (let j = 0; j < n; j++) {
            sortX[j] = poolX[idx[j]];
            sortY[j] = poolY[idx[j]];
            sortAlt[j] = poolAlt[idx[j]];
        }
    }
    function lowerBound(v, n) {
        let lo = 0, hi = n;
        while (lo < hi) { const mid = (lo + hi) >> 1; if (sortX[mid] < v) lo = mid + 1; else hi = mid; }
        return lo;
    }

    /* the selected model's uniform-window weighting at context size n. `half`
       is the averaging half-width (drawn as the blue bracket); `cut` bounds the
       binary search (== half for a hard window). */
    function modelKernel(n) {
        if (model === 'window') {
            return { cut: THETA_WIN, half: THETA_WIN, soft: false, w: d => (Math.abs(d) < THETA_WIN ? 1 : 0) };
        }
        const wl = wLocN(n);
        return { cut: wl, half: wl, soft: false, w: d => (Math.abs(d) < wl ? 1 : 0) };
    }

    /* THE selected model at test point q. `scramble` picks the dataset:
         false -> D_n  (original labels)
         true  -> D~_n (labels farther than eps_n FROM q resampled from phi~) */
    function predict(q, n, eps, scramble) {
        if (model === 'tabpfn') {                  /* read the checkpoint's output */
            return tpfAt((scramble ? TPF.scr : TPF.orig)[n], q);
        }
        sortPrefix(n);
        const k = modelKernel(n);
        const lo = lowerBound(q - k.cut, n), hi = lowerBound(q + k.cut, n);
        let num = 0, den = 0;
        for (let i = lo; i < hi; i++) {
            const d = sortX[i] - q;
            const w = k.w(d);
            if (w === 0) continue;
            const y = (scramble && Math.abs(d) > eps) ? sortAlt[i] : sortY[i];
            num += w * y;
            den += w;
        }
        return den > 0 ? num / den : 0.5;
    }

    /* Var[q(x)] of the uniform-window average of Bernoulli labels, using the
       TRUE conditional variance p0(1-p0) (a property of the estimator, not of
       the scramble): Sum w^2 p0(1-p0) / (Sum w)^2. */
    function varAt(x, n) {
        sortPrefix(n);
        const k = modelKernel(n);
        const lo = lowerBound(x - k.cut, n), hi = lowerBound(x + k.cut, n);
        let sw = 0, sw2 = 0, swv = 0;
        for (let i = lo; i < hi; i++) {
            const d = sortX[i] - x;
            const w = k.w(d);
            if (w === 0) continue;
            const px = p0(sortX[i]);
            sw += w; sw2 += w * w; swv += w * w * px * (1 - px);
        }
        return sw > 0 ? swv / (sw * sw) : NaN;
    }
    /* interior grid, averaged, to get one variance number per n (boundaries
       excluded so their half-empty windows don't spike the mean) */
    const VGRID = [];
    for (let j = 0; j <= 40; j++) VGRID.push(X_MIN + X_SPAN * (0.08 + (0.92 - 0.08) * j / 40));
    function varOfN(n) {
        if (model === 'tabpfn') return TPF.var[n];   /* Monte-Carlo, precomputed */
        let s = 0, c = 0;
        for (const x of VGRID) { const v = varAt(x, n); if (!isNaN(v)) { s += v; c++; } }
        return c ? s / c : 0;
    }

    /* ================= LEFT PANEL ================= */
    let W = 720;                 /* re-fit to the panel's pixel aspect (fitViewBoxes) */
    const H = 430;
    const PL = 46, PR = 16, PT = 42, PB = 40;
    const gx = v => PL + (v - X_MIN) / X_SPAN * (W - PL - PR);
    const gy = v => H - PB - (v + 0.14) / 1.28 * (H - PT - PB);   /* y in [-0.14, 1.14] */

    let traceKey = '';
    const traceOrig = new Float64Array(TRACE_PTS + 1);
    const traceScr = new Float64Array(TRACE_PTS + 1);

    function buildTraces(n, eps) {
        const key = n + '|' + model;
        if (key === traceKey) return;
        traceKey = key;
        let oArr, sArr, m;
        if (model === 'tabpfn') {
            /* the checkpoint's own outputs, on its own query grid */
            oArr = TPF.orig[n]; sArr = TPF.scr[n]; m = oArr.length - 1;
        } else {
            for (let j = 0; j <= TRACE_PTS; j++) {
                const q = X_MIN + X_SPAN * j / TRACE_PTS;
                traceOrig[j] = predict(q, n, eps, false);
                traceScr[j] = predict(q, n, eps, true);
            }
            oArr = traceOrig; sArr = traceScr; m = TRACE_PTS;
        }
        const path = arr => {
            let d = '';
            for (let j = 0; j <= m; j++)
                d += `${j === 0 ? 'M' : 'L'} ${gx(X_MIN + X_SPAN * j / m).toFixed(1)} ${gy(arr[j]).toFixed(1)} `;
            return d;
        };
        document.getElementById('orig-trace').setAttribute('d', path(oArr));
        document.getElementById('scr-trace').setAttribute('d', path(sArr));
    }

    function grid() {
        let h = '';
        [0, 0.5, 1].forEach(v => {
            const y = gy(v);
            h += `<line x1="${PL}" y1="${y}" x2="${W - PR}" y2="${y}" stroke="#e2e8f0" stroke-width="1"/>` +
                 `<text x="${PL - 8}" y="${y + 4}" font-size="12" fill="#64748b" text-anchor="end">${v}</text>`;
        });
        for (let i = 0; i * 0.1 <= X_SPAN + 1e-9; i++) {
            const x = gx(X_MIN + i * 0.1);
            h += `<line x1="${x}" y1="${PT}" x2="${x}" y2="${H - PB}" stroke="#f1f5f9" stroke-width="1"/>`;
        }
        for (let i = 0; i * 0.25 <= X_SPAN + 1e-9; i++) {
            const v = X_MIN + i * 0.25;
            h += `<text x="${gx(v)}" y="${H - PB + 24}" font-size="12" fill="#64748b" text-anchor="middle">${v}</text>`;
        }
        document.getElementById('grid-lines').innerHTML = h;
    }

    function p0Path() {
        let d = '';
        for (let j = 0; j <= 200; j++) {
            const x = X_MIN + X_SPAN * j / 200;
            d += `${j === 0 ? 'M' : 'L'} ${gx(x).toFixed(1)} ${gy(p0(x)).toFixed(1)} `;
        }
        document.getElementById('p0-line').setAttribute('d', d);
    }

    /* ================= RIGHT PANEL: Var[q(x)] vs n ================= */
    let RW = 400;                /* re-fit to the panel's pixel aspect (fitViewBoxes) */
    const RH = 430, RPX = 64, RPY = 34;
    let scaleMode = 'log';

    /* log-spaced n grid for the variance curve (deduped) */
    const nGridVar = (() => {
        const s = new Set();
        const K = 72;
        for (let i = 0; i <= K; i++) s.add(Math.round(N_MIN * Math.pow(N_MAX / N_MIN, i / K)));
        return [...s].sort((a, b) => a - b);
    })();
    const markGridVar = nGridVar.filter((_, i) => i % 6 === 0);

    let varData = [];                 /* [n, Var[q]] per nGridVar entry */
    let varByN = new Map();
    let varMarks = markGridVar;
    let varRefL = 0, varAlpha = 1;
    let varKeyModel = '';

    function computeVarData() {
        if (varKeyModel === model) return;
        varKeyModel = model;
        if (model === 'tabpfn') {
            /* only the precomputed context sizes exist for the checkpoint */
            varData = TPF.nGrid.map(n => [n, TPF.var[n]]);
            varMarks = TPF.nGrid;
            varAlpha = 0.85;          /* measured log-log slope of the real runs */
        } else {
            varData = nGridVar.map(n => [n, varOfN(n)]);
            varMarks = markGridVar;
            /* rate guide L n^{-alpha}: alpha is the model's theoretical variance
               rate (1 for the fixed window, 4/5 for the localised one). */
            varAlpha = model === 'locwin' ? 0.8 : 1;
        }
        varByN = new Map(varData);
        /* L is fit as an UPPER bound so the dashed guide sits above the curve. */
        varRefL = Math.max(...varData.map(([n, v]) => v * Math.pow(n, varAlpha))) * 1.15;
    }

    function drawVarPanel(nCur, vCur) {
        const isLog = scaleMode === 'log';
        const EPS = 1e-7;
        const guidePeak = varRefL * Math.pow(nGridVar[0], -varAlpha);
        let x0, x1, y0, y1, rx, ry;

        if (isLog) {
            const lx = v => Math.log10(v), ly = v => Math.log10(Math.max(v, EPS));
            x0 = lx(N_MIN); x1 = lx(N_MAX);
            const ys = varData.map(d => ly(d[1])).concat(ly(vCur), ly(guidePeak));
            y0 = Math.min(...ys) - 0.15; y1 = Math.max(...ys) + 0.15;
            rx = v => RPX + (lx(v) - x0) / (x1 - x0) * (RW - 2 * RPX);
            ry = v => RH - RPY - (ly(v) - y0) / (y1 - y0) * (RH - 2 * RPY);
        } else {
            x0 = 0; x1 = N_MAX;
            y0 = 0; y1 = Math.max(...varData.map(d => d[1]), vCur, guidePeak) * 1.05;
            rx = v => RPX + (v - x0) / (x1 - x0) * (RW - 2 * RPX);
            ry = v => RH - RPY - (v - y0) / (y1 - y0) * (RH - 2 * RPY);
        }

        let g = '';
        if (isLog) {
            const loDec = Math.floor(y0), hiDec = Math.ceil(y1);
            for (let d = loDec; d <= hiDec; d++) {
                const v = Math.pow(10, d), y = ry(v);
                g += `<line x1="${RPX}" y1="${y}" x2="${RW - RPX}" y2="${y}" stroke="#e2e8f0" stroke-width="1"/>` +
                     `<text x="${RPX - 8}" y="${y + 4}" font-size="10" fill="#64748b" text-anchor="end">${v.toExponential(0)}</text>`;
            }
        } else {
            for (let i = 0; i <= 4; i++) {
                const v = y0 + i * (y1 - y0) / 4, y = ry(v);
                g += `<line x1="${RPX}" y1="${y}" x2="${RW - RPX}" y2="${y}" stroke="#e2e8f0" stroke-width="1"/>` +
                     `<text x="${RPX - 8}" y="${y + 4}" font-size="10" fill="#64748b" text-anchor="end">${v.toExponential(1)}</text>`;
            }
        }
        (isLog ? [20, 100, 1000, 10000] : [0, 2500, 5000, 7500, 10000]).forEach(n => {
            const x = rx(Math.max(n, N_MIN));
            g += `<line x1="${x}" y1="${RPY}" x2="${x}" y2="${RH - RPY}" stroke="#f1f5f9" stroke-width="1"/>` +
                 `<text x="${x}" y="${RH - RPY + 16}" font-size="11" fill="#64748b" text-anchor="middle">${n}</text>`;
        });
        document.getElementById('var-grid').innerHTML = g;

        document.getElementById('var-line').setAttribute('d',
            varData.map((d, j) => `${j === 0 ? 'M' : 'L'} ${rx(d[0]).toFixed(1)} ${ry(d[1]).toFixed(1)}`).join(' '));

        document.getElementById('var-marks').innerHTML = varMarks.map(n =>
            `<circle cx="${rx(n).toFixed(1)}" cy="${ry(varByN.get(n)).toFixed(1)}" r="3.5" fill="#64748b"/>`).join('');

        const REF_PTS = 40;
        let refD = '';
        for (let j = 0; j <= REF_PTS; j++) {
            const n = N_MIN + j * (N_MAX - N_MIN) / REF_PTS;
            refD += (j === 0 ? 'M' : ' L') + ` ${rx(n).toFixed(1)} ${ry(varRefL * Math.pow(n, -varAlpha)).toFixed(1)}`;
        }
        document.getElementById('ref-line').setAttribute('d', refD);
        const refLbl = document.getElementById('ref-label');
        const labelN = N_MIN * 3;
        refLbl.setAttribute('x', rx(labelN) + 4);
        refLbl.setAttribute('y', ry(varRefL * Math.pow(labelN, -varAlpha)) - 6);
        refLbl.textContent = model === 'locwin' ? 'L n^−⁴ᐟ⁵'
                          : model === 'tabpfn' ? 'L n^−0.85' : 'L / n';

        const cur = document.getElementById('var-current');
        cur.setAttribute('cx', rx(nCur));
        cur.setAttribute('cy', ry(vCur));
    }

    /* ================= UPDATE ================= */
    const xSlider = document.getElementById('x-slider');
    const nSlider = document.getElementById('n-slider');

    function update() {
        const xq = parseFloat(xSlider.value);
        nSamples = nOfSlider(parseInt(nSlider.value));
        /* the checkpoint was only run at the context sizes in TPF.nGrid, so snap
           to the nearest one — the label and the drawn samples then match the
           context TabPFN actually saw. */
        if (model === 'tabpfn') nSamples = tpfSnapN(nSamples);
        /* the per-layer attention-window picker only applies to TabPFN */
        layerGroup.style.display = model === 'tabpfn' ? '' : 'none';
        document.getElementById('x-val').innerText = xq.toFixed(2);
        document.getElementById('n-val').innerText = nSamples;

        const eps = epsN(nSamples);
        computeVarData();
        buildTraces(nSamples, eps);

        const op = predict(xq, nSamples, eps, false);
        const sp = predict(xq, nSamples, eps, true);

        /* eps_n band around x* */
        const band = document.getElementById('window-band');
        const bx0 = gx(Math.max(X_MIN, xq - eps)), bx1 = gx(Math.min(X_MAX, xq + eps));
        band.setAttribute('x', bx0);
        band.setAttribute('width', bx1 - bx0);
        band.setAttribute('y', PT);
        band.setAttribute('height', H - PT - PB);

        /* averaging window: a hard blue bracket for the window smoothers; for
           TabPFN the MEASURED attention window, drawn as two nested bracket
           LINES only (no shaded area): SOLID = 90% of the attention mass,
           DASHED = 50%. Compare against the shrinking eps_n frame the same way
           the smoothers' bracket is compared — it does NOT shrink with n. */
        const wy = PT + 16;
        if (model === 'tabpfn') {
            const tw = tpfWin(nSamples, xq);
            const px = h => [clamp(gx(xq - h), PL, W - PR), clamp(gx(xq + h), PL, W - PR)];
            const [a50, b50] = px(tw.h50), [a90, b90] = px(tw.h90);
            const y90 = wy, y50 = wy + 9;
            const tick = (x, y) => `<line x1="${x}" y1="${y - 4}" x2="${x}" y2="${y + 4}" stroke="#2563eb" stroke-width="2"/>`;
            document.getElementById('model-window').innerHTML =
                `<line x1="${a90}" y1="${y90}" x2="${b90}" y2="${y90}" stroke="#2563eb" stroke-width="2"/>` +
                tick(a90, y90) + tick(b90, y90) +
                `<line x1="${a50}" y1="${y50}" x2="${b50}" y2="${y50}" stroke="#2563eb" stroke-width="2" stroke-dasharray="5,3"/>` +
                tick(a50, y50) + tick(b50, y50) +
                `<text x="${(a90 + b90) / 2}" y="${y90 - 6}" font-size="11" fill="#2563eb" text-anchor="middle">attention window</text>`;
        } else {
            const kw = modelKernel(nSamples);
            const half = kw.half;
            const wxL = clamp(gx(xq - half), PL, W - PR);
            const wxR = clamp(gx(xq + half), PL, W - PR);
            document.getElementById('model-window').innerHTML =
                `<line x1="${wxL}" y1="${wy}" x2="${wxR}" y2="${wy}" stroke="#2563eb" stroke-width="2"/>` +
                `<line x1="${wxL}" y1="${wy - 4}" x2="${wxL}" y2="${wy + 4}" stroke="#2563eb" stroke-width="2"/>` +
                `<line x1="${wxR}" y1="${wy - 4}" x2="${wxR}" y2="${wy + 4}" stroke="#2563eb" stroke-width="2"/>` +
                `<text x="${(wxL + wxR) / 2}" y="${wy - 6}" font-size="11" fill="#2563eb" text-anchor="middle">averaging window</text>`;
        }

        /* samples: dots outside the eps_n band show the scrambled label (hollow
           violet); inside the band the two datasets agree. */
        const stride = Math.max(1, Math.ceil(nSamples / DRAW_CAP));
        const r = nSamples > 800 ? 3 : 4;
        let h2 = '';
        for (let i = 0; i < nSamples; i += stride) {
            const far = Math.abs(poolX[i] - xq) > eps;
            const y = far ? poolAlt[i] : poolY[i];
            const cx = gx(poolX[i]).toFixed(1), cy = gy(y + poolJit[i]).toFixed(1);
            if (far) h2 += `<circle cx="${cx}" cy="${cy}" r="${r + 0.5}" fill="none" stroke="#7c3aed" stroke-width="1.8"/>`;
            else h2 += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="#ef4444" stroke="#ffffff" stroke-width="1"/>`;
        }
        document.getElementById('points-layer').innerHTML = h2;

        /* test point */
        const tx = gx(xq);
        const tl = document.getElementById('test-line');
        tl.setAttribute('x1', tx); tl.setAttribute('y1', PT);
        tl.setAttribute('x2', tx); tl.setAttribute('y2', H - PB);
        const star = document.getElementById('test-star');
        star.setAttribute('x', tx); star.setAttribute('y', H - PB + 18);

        /* the gap |q(D_n) - q(D~_n)| — closes (localised) or opens (fixed) */
        document.getElementById('gap-marker').innerHTML =
            `<line x1="${tx}" y1="${gy(op)}" x2="${tx}" y2="${gy(sp)}" stroke="#0f172a" stroke-width="3" opacity="0.55"/>`;

        /* markers at x*: gray diamond = truth p0(x*); teal/orange squares = the
           model on the two datasets */
        const diamond = (cx, cy, fill) =>
            `<path d="M ${cx.toFixed(1)} ${(cy - 7).toFixed(1)} L ${(cx + 7).toFixed(1)} ${cy.toFixed(1)} ` +
            `L ${cx.toFixed(1)} ${(cy + 7).toFixed(1)} L ${(cx - 7).toFixed(1)} ${cy.toFixed(1)} Z" fill="${fill}" stroke="#ffffff" stroke-width="1.5"/>`;
        document.getElementById('pred-markers').innerHTML =
            diamond(tx, gy(p0(xq)), '#94a3b8') +
            `<rect x="${tx - 6}" y="${gy(op) - 6}" width="12" height="12" rx="2" fill="#0d9488" stroke="#ffffff" stroke-width="1.5"/>` +
            `<rect x="${tx - 6}" y="${gy(sp) - 6}" width="12" height="12" rx="2" fill="#f97316" stroke="#ffffff" stroke-width="1.5"/>`;

        drawVarPanel(nSamples, varOfN(nSamples));
    }

    /* 0 = mean over layers, 1..nLayers = encoder layer k-1 */
    const layerGroup = document.getElementById('layer-group');
    const layerSelect = document.getElementById('layer-select');
    layerSelect.innerHTML = ['<option value="0">mean of layers</option>']
        .concat(Array.from({ length: TPF.win.nLayers },
            (_, k) => `<option value="${k + 1}">layer ${k}</option>`))
        .join('');
    layerSelect.value = String(attnLayer);
    layerSelect.addEventListener('change', () => {
        attnLayer = parseInt(layerSelect.value);
        update();
    });

    xSlider.addEventListener('input', update);
    nSlider.addEventListener('input', update);

    document.getElementById('model-seg').addEventListener('click', e => {
        const btn = e.target.closest('button');
        if (!btn) return;
        model = btn.dataset.m;
        document.querySelectorAll('#model-seg button').forEach(b => b.classList.toggle('active', b === btn));
        update();
    });
    /* drop any model this embed does not offer, then mark the starting one */
    document.querySelectorAll('#model-seg button').forEach(b => {
        if (!allowedModels.includes(b.dataset.m)) b.remove();
        else b.classList.toggle('active', b.dataset.m === model);
    });
    document.querySelectorAll('#scale-toggle button').forEach(btn => {
        btn.addEventListener('click', () => {
            if (btn.dataset.scale === scaleMode) return;
            scaleMode = btn.dataset.scale;
            document.querySelectorAll('#scale-toggle button').forEach(b => b.classList.toggle('active', b === btn));
            update();
        });
    });

    /* ---- draggable splitter: sets the two panels' flex-basis from a single
       fraction; the SVGs rescale via viewBox/preserveAspectRatio, so no redraw
       is needed. Past HIDE at either end the shrunk panel collapses to zero and
       is hidden; dragging back past the threshold restores it. ---- */
    const vizRow = document.getElementById('viz-row');
    const mainPanel = document.getElementById('main-panel');
    const ratePanel = document.getElementById('rate-panel');
    const divider = document.getElementById('drag-divider');
    const HIDE = 0.07;
    const DEFAULT_FRAC = 0.66;
    let frac = DEFAULT_FRAC;

    function applyLayout() {
        if (frac <= HIDE) {
            mainPanel.style.display = 'none';
            ratePanel.style.display = '';
            ratePanel.style.flex = '1 1 auto';
        } else if (frac >= 1 - HIDE) {
            ratePanel.style.display = 'none';
            mainPanel.style.display = '';
            mainPanel.style.flex = '1 1 auto';
        } else {
            mainPanel.style.display = '';
            ratePanel.style.display = '';
            mainPanel.style.flex = `1 1 ${(frac * 100).toFixed(2)}%`;
            ratePanel.style.flex = `1 1 ${((1 - frac) * 100).toFixed(2)}%`;
        }
    }

    let dragging = false;
    divider.addEventListener('pointerdown', e => {
        dragging = true;
        divider.classList.add('dragging');
        divider.setPointerCapture(e.pointerId);
        document.body.style.userSelect = 'none';
        e.preventDefault();
    });
    divider.addEventListener('pointermove', e => {
        if (!dragging) return;
        const rect = vizRow.getBoundingClientRect();
        frac = clamp((e.clientX - rect.left) / rect.width, 0, 1);
        applyLayout();
    });
    const endDrag = e => {
        if (!dragging) return;
        dragging = false;
        divider.classList.remove('dragging');
        document.body.style.userSelect = '';
        try { divider.releasePointerCapture(e.pointerId); } catch (_) {}
    };
    divider.addEventListener('pointerup', endDrag);
    divider.addEventListener('pointercancel', endDrag);
    divider.addEventListener('dblclick', () => { frac = DEFAULT_FRAC; applyLayout(); });

    /* ---- keep each plot filling its panel: match the SVG viewBox aspect to
       the panel's live pixel aspect (height fixed at H/RH), so preserveAspectRatio
       'meet' fills the box instead of letterboxing. Re-fit on every panel resize,
       including during a splitter drag. ---- */
    const traceSvg = document.getElementById('trace-plot');
    const varSvg = document.getElementById('var-plot');
    const varXTitle = document.getElementById('var-x-title');
    function fitViewBoxes() {
        const cwM = mainPanel.clientWidth, chM = mainPanel.clientHeight;
        if (cwM > 0 && chM > 0) {
            W = Math.max(300, Math.round(H * cwM / chM));
            traceSvg.setAttribute('viewBox', `0 0 ${W} ${H}`);
        }
        const cwR = ratePanel.clientWidth, chR = ratePanel.clientHeight;
        if (cwR > 0 && chR > 0) {
            RW = Math.max(240, Math.round(RH * cwR / chR));
            varSvg.setAttribute('viewBox', `0 0 ${RW} ${RH}`);
            varXTitle.setAttribute('x', RW / 2);
        }
        traceKey = '';                 /* gx spread changed → force trace rebuild */
        grid(); p0Path(); update();
    }
    const ro = new ResizeObserver(fitViewBoxes);
    ro.observe(mainPanel);
    ro.observe(ratePanel);

    applyLayout();
    fitViewBoxes();
</script>
</body>
</html>
