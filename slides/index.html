<!doctype html>
<!-- ===================================================================
  Prior-Data Fitted Networks — reveal.js port of slides/main.tex
  (Beamer/metropolis, aspectratio=169).

  This file is the thin shell, analogous to main.tex:
    * loads reveal.js (pinned 5.1.0), KaTeX (pinned 0.16.11), fonts,
      the theme, and the shared figure helpers (js/figures.js);
    * holds only the TITLE PAGE; the Outline (TOC) slide and the
      per-section divider "Outline" slides are generated by
      js/loader.js from the SECTIONS list there (this mirrors
      \tableofcontents + \AtBeginSection in preamble.tex);
    * js/loader.js then fetches each sections/*.html fragment in the
      same order as the \input{sections/...} calls in main.tex.

  HOW TO ADJUST:
    - Slide geometry (1280x720 = 16cm x 9cm at 80px/cm) and reveal
      options live at the bottom of js/loader.js.
    - Theme colors/fonts: css/theme.css.
    - Section order / TOC titles: SECTIONS list in js/loader.js.
    - Serve with `python -m http.server` from this directory
      (fetch() of the section fragments does not work over file://).
=================================================================== -->
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Prior-Data Fitted Networks</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    /* Full-viewport deck; crisp text via viewport-sized canvas (see loader.js) */
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; }
    .reveal { width: 100% !important; height: 100% !important; }
  </style>

  <!-- reveal.js 5.1.0 (pinned) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/5.1.0/reset.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/5.1.0/reveal.min.css">

  <!-- KaTeX 0.16.11 (pinned) — rendered manually from js/loader.js so we
       control macros + trust (needed for \htmlClass overlay recoloring) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">

  <!-- Latin Modern Roman — standard LaTeX body font (vector WOFF2) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/lmroman10@5.2.5/400.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/lmroman10@5.2.5/700.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/lmroman10@5.2.5/400-italic.css">

  <!-- Deck theme (metropolis-like, dark-green title bar dropped) + figure styles -->
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/figures.css">
</head>
<body>
  <div class="reveal">
    <div class="slides">

      <!-- ============================================================
        TITLE PAGE  (main.tex: \titlepage; metadata from preamble.tex)
        HOW TO ADJUST: texts here; spacing/fonts in css/theme.css
        under ".title-slide".
      ============================================================ -->
      <section class="title-slide">
        <div class="title-block">
          <h1>Prior-Data Fitted Networks</h1>
          <div class="title-rule"></div>
          <p class="title-subtitle">[s26] Theoretical Foundations of Amortization and Meta-, and In-Context Learning</p>
          <p class="title-author">Egor Kashkarov</p>
          <p class="title-date">July 11, 2026</p>
        </div>
      </section>

      <!-- ============================================================
        OUTLINE (TOC) — placeholder; js/loader.js fills it with the
        section list (mirrors \tableofcontents in main.tex). The
        per-section divider "Outline" slides (\AtBeginSection in
        preamble.tex) are also generated by the loader and inserted
        before each section's first slide.
      ============================================================ -->
      <section class="toc-slide" data-outline>
        <header class="frame-head"><h2 class="frame-title">Outline</h2></header>
        <ul class="toc"><!-- filled by js/loader.js --></ul>
      </section>

      <!-- Section fragments (sections/*.html) are injected here, in the
           order given by SECTIONS in js/loader.js — same order as the
           \input{sections/...} calls in main.tex. -->

    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/5.1.0/reveal.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/5.1.0/plugin/notes/notes.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
  <script src="js/figures.js"></script>
  <script src="js/cite.js"></script>
  <script src="js/loader.js"></script>
</body>
</html>
